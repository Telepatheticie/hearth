}

function toggleWizRoom(id){
  if(wizState.excludedRooms.has(id)) wizState.excludedRooms.delete(id);
  else wizState.excludedRooms.add(id);
  renderWizard();
}

function wizRoomsSelectNext(){
  wizState.currentRoomIdx = 0;
  // Skip to first non-excluded room
  while(wizState.currentRoomIdx < WIZ_ROOMS.length &&
        wizState.excludedRooms.has(WIZ_ROOMS[wizState.currentRoomIdx].id)){
    wizState.currentRoomIdx++;
  }
  if(wizState.currentRoomIdx >= WIZ_ROOMS.length){
    wizState.stage = 'summary';
  } else {
    wizState.stage = 'rooms-walk';
  }
  renderWizard();
}

// ── STAGE 3: ROOM WALKTHROUGH ──────────────────────────────────────────────
function renderWizRoomsWalk(){
  const activeRooms = WIZ_ROOMS.filter(r=>!wizState.excludedRooms.has(r.id));
  const room = WIZ_ROOMS[wizState.currentRoomIdx];
  const doneIdx = activeRooms.indexOf(room);
  const total = activeRooms.length;

  // Get template jobs for this room
  const templateJobs = Object.values(state.jobs)
    .filter(j=>j.room===room.room && j.tier!=='stepchange')
    .slice(0,5);

  const extracted = wizState.extractedJobs[room.id] || [];
  const hasExtracted = extracted.length > 0;

  const pips = activeRooms.map((r,i)=>{
    const isDone = wizState.roomsDone.has(r.id);
    const isActive = r.id === room.id;
    return `<button class="wiz-pip ${isDone?'done':isActive?'active':''}">${r.icon} ${r.name}</button>`;
  }).join('');

  const extractedHtml = hasExtracted ? `
    <div class="wiz-extracted">
      <div class="wiz-extracted-label">Jobs found — edit anything</div>
      <div id="wiz-job-list-${room.id}">
        ${extracted.map((j,i)=>wizJobRowHTML(room.id,i,j.text,j.freq)).join('')}
      </div>
      <div class="wiz-add-row">
        <input class="wiz-add-input" id="wiz-add-${room.id}" placeholder="Add a job I missed…" onkeydown="if(event.key==='Enter')wizAddJob('${room.id}')">
        <button class="wiz-add-btn" onclick="wizAddJob('${room.id}')">+</button>
      </div>
    </div>` : '';

  return `
    <div class="wiz-pip-strip">${pips}</div>
    <div class="wiz-body" style="padding-top:20px;">
      <div class="wiz-eyebrow">Room ${doneIdx+1} of ${total}</div>

      <div class="wiz-room-card">
        <div class="wiz-room-card-header">
          <span class="room-icon">${room.icon}</span>
          <div>
            <div class="wiz-room-card-title">${room.name}</div>
            <div class="wiz-room-card-sub">${room.prompts}</div>
          </div>
        </div>

        ${templateJobs.length ? `
        <div class="wiz-template-jobs">
          <div class="wiz-template-label">Already in your system</div>
          ${templateJobs.map(j=>`<div class="wiz-template-item">${j.title}</div>`).join('')}
          ${Object.values(state.jobs).filter(j=>j.room===room.room&&j.tier!=='stepchange').length > 5
            ? `<div style="font-size:11px;color:var(--slate2);padding-top:4px;">…and ${Object.values(state.jobs).filter(j=>j.room===room.room&&j.tier!=='stepchange').length - 5} more</div>`
            : ''}
          <div style="font-size:11px;color:var(--slate);padding-top:6px;">Add anything specific to your ${room.name.toLowerCase()} below.</div>
        </div>` : ''}

        <div class="wiz-chips">
          ${room.chips.map(c=>`<button class="wiz-chip" onclick="wizAppendChip('${room.id}','${c}')">${c}</button>`).join('')}
        </div>

        <textarea class="wiz-textarea" id="wiz-ta-${room.id}"
          placeholder="Anything specific to your ${room.name.toLowerCase()}? Tap chips above or just talk…"
        ></textarea>

        <div class="wiz-room-actions">
          <button class="wiz-btn-analyse" id="wiz-analyse-${room.id}" onclick="wizAnalyseRoom('${room.id}')">
            ${hasExtracted ? 'Re-analyse' : 'Find jobs in this room →'}
          </button>
          <button class="wiz-btn-skip" onclick="wizSkipRoom()">Skip</button>
        </div>

        ${hasExtracted ? extractedHtml : '<div id="wiz-extracted-placeholder"></div>'}
      </div>
    </div>
    <div class="wiz-nav">
      <button class="wiz-btn-back" onclick="wizRoomBack()">←</button>
      <button class="wiz-btn-pause" onclick="pauseWizard()">⏸ Pause</button>
      <button class="wiz-btn-next" onclick="wizSaveRoom('${room.id}')">${hasExtracted ? 'Save & next →' : 'Skip this room →'}</button>
    </div>
  `;
}

function wizAppendChip(roomId, chip){
  const ta = document.getElementById(`wiz-ta-${roomId}`);
  if(ta) { ta.value += (ta.value&&!ta.value.endsWith(' ')?'. ':'')+chip+': '; ta.focus(); }
}

async function wizAnalyseRoom(roomId){
  const ta = document.getElementById(`wiz-ta-${roomId}`);
  const text = (ta ? ta.value.trim() : '');
  if(text.length < 5){
    ta.style.border='1.5px solid var(--rust)';
    setTimeout(()=>ta.style.border='',1200);
    return;
  }
  const room = WIZ_ROOMS.find(r=>r.id===roomId);
  const btn = document.getElementById(`wiz-analyse-${roomId}`);
  btn.disabled = true; btn.textContent = 'Analysing…';

  // Show loading in extracted area
  const placeholder = document.getElementById('wiz-extracted-placeholder') ||
    document.querySelector('.wiz-extracted');
  if(placeholder) placeholder.innerHTML = `<div class="wiz-loading"><div class="wiz-spinner"></div>Reading what you said…</div>`;

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        system:`Extract discrete household cleaning and maintenance jobs from a room description.
Return ONLY a JSON array, no markdown. Each item: {"text":"short actionable job title under 8 words","freq":"weekly"|"fortnightly"|"monthly"|"quarterly"|"annually"|"one-off"}
Rules: keep titles short and actionable. Split compound problems. Include everything mentioned. "one-off" for repairs/projects, "weekly" for regular cleaning, scale others sensibly.`,
        messages:[{role:'user',content:`Room: ${room.name}\n\nDescription: ${text}`}]
      })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text||'[]';
    let jobs;
    try{ jobs = JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch{ jobs=[]; }
    if(!Array.isArray(jobs)||!jobs.length) jobs=[{text:`Check ${room.name.toLowerCase()} notes`,freq:'monthly'}];
    wizState.extractedJobs[roomId] = jobs;
    renderWizard();
  } catch(err){
    if(btn){ btn.disabled=false; btn.textContent='Try again'; }
    showToast('Could not connect — check internet');
  }
}

function wizJobRowHTML(roomId, i, text, freq){
  const freqs = ['daily','weekly','fortnightly','monthly','quarterly','annually','one-off'];
  return `<div class="wiz-job-row" id="wiz-row-${roomId}-${i}">
    <input class="wiz-job-input" id="wiz-jt-${roomId}-${i}" value="${text.replace(/"/g,'&quot;')}">
    <select class="wiz-job-freq" id="wiz-jf-${roomId}-${i}">
      ${freqs.map(f=>`<option value="${f}" ${freq===f?'selected':''}>${f}</option>`).join('')}
    </select>
    <button class="wiz-job-del" onclick="wizDelJob('${roomId}',${i})">×</button>
  </div>`;
}

function wizDelJob(roomId, i){
  const row = document.getElementById(`wiz-row-${roomId}-${i}`);
  if(row) row.remove();
}

function wizAddJob(roomId){
  const inp = document.getElementById(`wiz-add-${roomId}`);
  if(!inp||!inp.value.trim()) return;
  const list = document.getElementById(`wiz-job-list-${roomId}`);
  const idx = Date.now();
  const div = document.createElement('div');
  div.innerHTML = wizJobRowHTML(roomId, idx, inp.value.trim(), 'monthly');
  list.appendChild(div.firstElementChild);
  inp.value = '';
}

function wizCollectJobs(roomId){
  const rows = document.querySelectorAll(`[id^="wiz-row-${roomId}-"]`);
  const jobs = [];
  rows.forEach(row=>{
    const idx = row.id.replace(`wiz-row-${roomId}-`,'');
    const t = document.getElementById(`wiz-jt-${roomId}-${idx}`);
    const f = document.getElementById(`wiz-jf-${roomId}-${idx}`);
    if(t&&t.value.trim()) jobs.push({text:t.value.trim(), freq:f?f.value:'monthly'});
  });
  return jobs;
}

function wizSaveRoom(roomId){
  // Collect any edited jobs
  if(wizState.extractedJobs[roomId]){
    wizState.extractedJobs[roomId] = wizCollectJobs(roomId);
  }
  wizState.roomsDone.add(roomId);
  wizNextRoom();
}

function wizSkipRoom(){
  wizNextRoom();
}

function wizNextRoom(){
  wizState.currentRoomIdx++;
  while(wizState.currentRoomIdx < WIZ_ROOMS.length &&
        wizState.excludedRooms.has(WIZ_ROOMS[wizState.currentRoomIdx].id)){
    wizState.currentRoomIdx++;
  }
  if(wizState.currentRoomIdx >= WIZ_ROOMS.length){
    wizState.stage = 'summary';
  }
  renderWizard();
}

function wizRoomBack(){
  if(wizState.currentRoomIdx === 0){
    wizState.stage = 'rooms-select';
    renderWizard();
    return;
  }
  wizState.currentRoomIdx--;
  while(wizState.currentRoomIdx > 0 &&
        wizState.excludedRooms.has(WIZ_ROOMS[wizState.currentRoomIdx].id)){
    wizState.currentRoomIdx--;
  }
  renderWizard();
}

// ── STAGE 4: SUMMARY ───────────────────────────────────────────────────────
function renderWizSummary(){
  const allNewJobs = Object.values(wizState.extractedJobs).flat();
  const byRoom = WIZ_ROOMS.filter(r=>wizState.extractedJobs[r.id]&&wizState.extractedJobs[r.id].length);
  const totalExisting = Object.values(state.jobs).filter(j=>j.tier!=='stepchange').length;

  return `
    <div class="wiz-body">
      <div class="wiz-eyebrow">Step 4 of 4</div>
      <h1 class="wiz-title">Almost <em>there</em></h1>
      <p class="wiz-sub">Here's what we found. These will be added to your existing job list.</p>

      <div class="wiz-summary-grid">
        <div class="wiz-summary-card">
          <div class="wiz-summary-num">${allNewJobs.length}</div>
          <div class="wiz-summary-lbl">New jobs found</div>
        </div>
        <div class="wiz-summary-card">
          <div class="wiz-summary-num">${totalExisting}</div>
          <div class="wiz-summary-lbl">Already in system</div>
        </div>
      </div>

      ${byRoom.length ? byRoom.map(r=>`
        <div class="wiz-room-summary">
          <span class="wiz-room-summary-name">${r.icon} ${r.name}</span>
          <span class="wiz-room-summary-count">${wizState.extractedJobs[r.id].length} job${wizState.extractedJobs[r.id].length!==1?'s':''}</span>
        </div>`).join('') : `<div style="text-align:center;padding:20px;color:var(--slate);font-size:13px;">No new jobs were added — your existing list is your starting point.</div>`}

      ${wizState.whyStatement ? `
        <div class="wiz-why-preview" style="margin-top:20px;">
          <div class="wiz-why-label">Your why</div>
          <div class="wiz-why-text">${wizState.whyStatement}</div>
        </div>` : ''}
    </div>
    <div class="wiz-nav">
      <button class="wiz-btn-back" onclick="wizState.stage='rooms-walk';wizState.currentRoomIdx=0;renderWizard()">← Back</button>
      <button class="wiz-btn-next" onclick="wizConfirm()">Add to Hearth →</button>
    </div>
  `;
}

function wizConfirm(){
  // Merge extracted jobs into state.jobs
  const FREQ_MAP = {
    'daily':'daily','weekly':'weekly','fortnightly':'fortnightly',
    'monthly':'monthly','quarterly':'quarterly','annually':'annually','one-off':'one-off'
  };
  const TIER_MAP = {
    'daily':'micro','weekly':'micro','fortnightly':'micro',
    'monthly':'small','quarterly':'small','annually':'large','one-off':'large'
  };
  let added = 0;
  WIZ_ROOMS.forEach(wr=>{
    const jobs = wizState.extractedJobs[wr.id]||[];
    jobs.forEach((j,i)=>{
      if(!j.text.trim()) return;
      const id = `wiz_${wr.id}_${Date.now()}_${i}`;
      const freq = FREQ_MAP[j.freq]||'monthly';
      state.jobs[id] = {
        id, title:j.text, room:wr.room, tier:TIER_MAP[freq]||'small',
        freq, mins:30, notes:'', equip:[],
        last_done:null, assigned_to:'me', reset_count:0,
        status:'active', assigned_date:null, chunks:[],
      };
      added++;
    });
  });
  // Save mission
  state.mission = {...wizState.mission};
  state.whyStatement = wizState.whyStatement;
  state.wizardDone = true;
  saveState();
  wizState.stage = 'welcome';
  renderWizard();
}

// ── STAGE 5: WELCOME ───────────────────────────────────────────────────────
function renderWizWelcome(){
  return `
    <div class="wiz-body">
      <div class="wiz-eyebrow">You're all set</div>
      <h1 class="wiz-title">Welcome to <em>Hearth</em></h1>
      <p class="wiz-sub" style="margin-bottom:24px;">Here's how it works. You don't need to remember all of this — the app guides you.</p>

      <div class="wiz-welcome-feature">
        <div class="wiz-welcome-icon">📋</div>
        <div>
          <div class="wiz-welcome-title">Dispatch</div>
          <div class="wiz-welcome-desc">Your daily view. Shows what's due, prioritised by how overdue it is. Tap "Not now" to skip, "Roulette me" to see something different.</div>
        </div>
      </div>
      <div class="wiz-welcome-feature">
        <div class="wiz-welcome-icon">🎲</div>
        <div>
          <div class="wiz-welcome-title">Roulette</div>
          <div class="wiz-welcome-desc">Pick how long you've got and spin. Good for when you just want to do something without thinking about what.</div>
        </div>
      </div>
      <div class="wiz-welcome-feature">
        <div class="wiz-welcome-icon">▶</div>
        <div>
          <div class="wiz-welcome-title">Do a bit</div>
          <div class="wiz-welcome-desc">Big jobs are split into 20-minute parts. Tap "Do a bit" to tick off one part and make progress without committing to the whole thing.</div>
        </div>
      </div>
      <div class="wiz-welcome-feature">
        <div class="wiz-welcome-icon">💡</div>
        <div>
          <div class="wiz-welcome-title">Step Change</div>
          <div class="wiz-welcome-desc">Decisions that unlock everything else. One per fortnight — small thinking that creates permanent improvements.</div>
        </div>
      </div>

      ${wizState.whyStatement ? `
        <div class="wiz-why-preview" style="margin-top:20px;">
          <div class="wiz-why-label">Keep this in mind</div>
          <div class="wiz-why-text">${wizState.whyStatement}</div>
        </div>` : ''}
    </div>
    <div class="wiz-nav">
      <button class="wiz-btn-next" onclick="closeWizard();renderDispatch();">Go to Hearth →</button>
    </div>
  `;
}
