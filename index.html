function exportData(){
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `hearth-backup-${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup saved');
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      state = JSON.parse(ev.target.result);
      saveState();
      renderDispatch();
      showToast('Data restored');
    }catch{showToast('Import failed — invalid file');}
  };
  reader.readAsText(file);
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function boot(){
  if(!userKey){
    showKeySetup();
    return;
  }

  // Show app immediately from local cache
  initState();
  renderDispatch();

  // Show why statement on dispatch if set
  if(state.whyStatement) renderWhyBar();

  // Sync from Supabase in background
  try{
    const cloudState = await sbLoad(userKey);
    if(cloudState){
      state = cloudState;
      saveLocalState();
      supabaseSynced = true;
      initState();
      renderDispatch();
      if(state.whyStatement) renderWhyBar();
    } else {
      await sbSave(userKey, state);
      supabaseSynced = true;
    }
    setSyncDot('synced');
  } catch(e){
    console.warn('Supabase sync failed, using local cache:', e);
  }

  // Launch wizard if never completed
  if(!state.wizardDone){
    setTimeout(()=>launchWizard(), 400);
  }
}

function renderWhyBar(){
  const existing = document.getElementById('why-bar');
  if(existing) existing.remove();
  if(!state.whyStatement) return;
  const bar = document.createElement('div');
  bar.id = 'why-bar';
  bar.style.cssText = `
    background:var(--ink2);padding:10px 20px;
    font-family:'DM Serif Display',serif;font-size:13px;
    color:rgba(255,255,255,0.55);font-style:italic;line-height:1.4;
    border-bottom:1px solid rgba(255,255,255,0.06);
  `;
  bar.textContent = state.whyStatement;
  const panel = document.getElementById('tab-dispatch');
  if(panel) panel.insertBefore(bar, panel.firstChild);
}

function initState(){
  // ── ROOM ARCHITECTURE ──────────────────────────────────────────────────
  // New users: state.rooms will be built by the wizard.
  // Existing users (legacy string-based rooms): migrate on first load.
  if(!state.rooms){
    if(state.jobs && Object.keys(state.jobs).length > 0){
      // Migration path — build rooms from existing job room strings
      const roomNames = [...new Set(Object.values(state.jobs).map(j=>j.room).filter(Boolean))];
      state.rooms = roomNames.map((name, i) => ({
        id: `rm_${i}_${Date.now()}`,
        name,
        typeId: guessRoomType(name),
        active: true,
        createdAt: today(),
      }));
      // Add roomId to all jobs
      state.rooms.forEach(rm => {
        Object.values(state.jobs).forEach(j => {
          if(j.room === rm.name) j.roomId = rm.id;
        });
      });
      state.roomsMigrated = true;
    } else {
      // Fresh user — empty rooms array, wizard will populate
      state.rooms = [];
    }
  }

  // ── ASSIGNEES ─────────────────────────────────────────────────────────
  if(!state.assignees || !state.assignees.length){
    state.assignees = ['Assignee 1'];
  }

  // ── JOBS ──────────────────────────────────────────────────────────────
  if(!state.jobs){
    state.jobs = {};
  }
  if(!state.stepchange_index) state.stepchange_index = 0;
  if(!state.stepchange_shown) state.stepchange_shown = null;

  // ── SMART SCATTER ─────────────────────────────────────────────────────
  if(!state.scattered && Object.keys(state.jobs).length > 0){
    const SCATTER_FREQS = {
      'daily':1,'2-3x week':3,'weekly':7,'fortnightly':14,
      'monthly':30,'quarterly':91,'annually':365,'seasonal':90
    };
    const SKIP_TIERS = new Set(['large','major','stepchange']);
    const SKIP_FREQS = new Set(['one-off','as needed']);
    Object.values(state.jobs).forEach(j=>{
      if(SKIP_TIERS.has(j.tier)) return;
      if(SKIP_FREQS.has(j.freq)) return;
      if(j.last_done) return;
      if(j.status==='assigned') return;
      const window = SCATTER_FREQS[j.freq];
      if(!window) return;
      const daysAgo = Math.floor(Math.random() * window);
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      j.last_done = d.toISOString().split('T')[0];
    });
    state.scattered = true;
    saveState();
  }
}

function guessRoomType(name){
  const n = name.toLowerCase();
  if(n.includes('kitchen')) return 'kitchen';
  if(n.includes('bath') || n.includes('shower') || n.includes('loo') || n.includes('toilet')) return 'bathroom';
  if(n.includes('bed') || n.includes('room') || n.includes('master') || n.includes('guest')) return 'bedroom';
  if(n.includes('living') || n.includes('lounge') || n.includes('sitting') || n.includes('dining')) return 'living-room';
  if(n.includes('hall') || n.includes('stair') || n.includes('landing') || n.includes('porch') || n.includes('entry')) return 'hallway';
  if(n.includes('office') || n.includes('study')) return 'office';
  if(n.includes('utility') || n.includes('laundry') || n.includes('pantry') || n.includes('store')) return 'utility';
  if(n.includes('garden') || n.includes('outside') || n.includes('yard') || n.includes('patio')) return 'garden';
  return 'other';
}

// ── ROOM HELPERS ───────────────────────────────────────────────────────────
function getRooms(includeInactive){
  return (state.rooms||[]).filter(r => includeInactive || r.active);
}

function getActiveRoomNames(){
  return getRooms(false).map(r => r.name);
}

function createRoom(name, typeId, active){
  const id = `rm_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
  const room = {id, name: name.trim(), typeId: typeId||'other', active: active!==false, createdAt: today()};
  if(!state.rooms) state.rooms = [];
  state.rooms.push(room);
  return room;
}

function jobsForRoom(roomId, includeHidden){
  return Object.values(state.jobs).filter(j => {
    if(j.roomId !== roomId && j.room !== getRoomName(roomId)) return false;
    if(!includeHidden && j.wizSkipped) return false;
    return true;
  });
}

function getRoomName(roomId){
  const rm = (state.rooms||[]).find(r => r.id === roomId);
  return rm ? rm.name : '';
}

function getRoomById(roomId){
  return (state.rooms||[]).find(r => r.id === roomId);
}

// ── WIZARD ─────────────────────────────────────────────────────────────────
// wizState persists across renders
let wizState = {
  stage: 'mission',
  mission: {now:'', want:'', know:''},
  whyStatement: '',
  roomInstances: [],
  currentRoomIdx: 0,
  extractedJobs: {},
  roomsDone: new Set(),
  skippedTemplateJobs: {},
  roomNotes: {},
  isRevisit: false,
};

function launchWizard(){ launchWizardAtStage('mission'); }

function launchWizardAtStage(stage){
  const overlay = document.getElementById('wizard-overlay');
  overlay.style.display = 'block';
  document.body.style.overflow = 'hidden';
  if(state.wizState){
    const saved = state.wizState;
    wizState.mission = saved.mission || {now:'',want:'',know:''};
    wizState.whyStatement = saved.whyStatement || '';
    wizState.roomInstances = saved.roomInstances || [];
    wizState.extractedJobs = saved.extractedJobs || {};
    wizState.roomsDone = new Set(saved.roomsDone||[]);
    wizState.skippedTemplateJobs = saved.skippedTemplateJobs || {};
    wizState.roomNotes = saved.roomNotes || {};
    wizState.currentRoomIdx = saved.currentRoomIdx || 0;
  } else {
    if(state.mission) wizState.mission = {...state.mission};
    if(state.whyStatement) wizState.whyStatement = state.whyStatement;
  }
  wizState.isRevisit = !!(state.rooms && state.rooms.length > 0);
  wizState.stage = stage;
  renderWizard();
}

function closeWizard(){
  document.getElementById('wizard-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

function pauseWizard(){
  captureWizTextarea();
  persistWizState();
  closeWizard();
  showToast('Progress saved — continue from Settings');
}

function persistWizState(){
  state.wizState = {
    stage: wizState.stage,
    mission: wizState.mission,
    whyStatement: wizState.whyStatement,
    roomInstances: wizState.roomInstances,
    extractedJobs: wizState.extractedJobs,
    roomsDone: [...wizState.roomsDone],
    skippedTemplateJobs: wizState.skippedTemplateJobs,
    roomNotes: wizState.roomNotes,
    currentRoomIdx: wizState.currentRoomIdx,
  };
  state.mission = {...wizState.mission};
  state.whyStatement = wizState.whyStatement;
  saveState();
}

function captureWizTextarea(){
  const inst = getActiveInstances()[wizState.currentRoomIdx];
  if(!inst) return;
  const ta = document.getElementById(`wiz-ta-${inst.instanceId}`);
  if(ta) wizState.roomNotes[inst.instanceId] = ta.value;
}

function getActiveInstances(){
  return (wizState.roomInstances||[]).filter(r=>r.active!==false);
}

function renderWizard(){
  const overlay = document.getElementById('wizard-overlay');
  const stages = {mission:1,'rooms-select':2,'rooms-walk':3,summary:4,welcome:5};
  const pct = ((stages[wizState.stage]||1)-1)/4*100;
  let content = '';
  if(wizState.stage==='mission') content = renderWizMission();
  else if(wizState.stage==='rooms-select') content = renderWizRoomsSelect();
  else if(wizState.stage==='rooms-walk') content = renderWizRoomsWalk();
  else if(wizState.stage==='summary') content = renderWizSummary();
  else if(wizState.stage==='welcome') content = renderWizWelcome();
  overlay.innerHTML = `
    <div class="wiz-screen">
      <div class="wiz-header">
        <div class="wiz-logo"><em>Hearth</em> Setup</div>
        <button class="wiz-skip" onclick="pauseWizard()">Save & do this later</button>
      </div>
      <div class="wiz-progress"><div class="wiz-progress-fill" style="width:${pct}%"></div></div>
      ${content}
    </div>
  `;
  overlay.scrollTop = 0;
  setTimeout(()=>{
    const activePip = overlay.querySelector('.wiz-pip.active');
    if(activePip) activePip.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  }, 50);
}

function updateWizWhy(){
  const want = wizState.mission.want.trim();
  const know = wizState.mission.know.trim();

  let why = `You're doing this so your home feels ${want.replace(/\.$/, '').toLowerCase()}.`;

  wizState.whyStatement = why;
  const preview = document.getElementById('wiz-why-preview');
  const text = document.getElementById('wiz-why-text');
  if(preview) preview.style.display = 'block';
  if(text) text.textContent = why;
}

function wizMissionNext(){
  wizState.mission.now = (document.getElementById('wiz-now')||{}).value || wizState.mission.now;
  wizState.mission.want = (document.getElementById('wiz-want')||{}).value || wizState.mission.want;
  wizState.mission.know = (document.getElementById('wiz-know')||{}).value || wizState.mission.know;
  updateWizWhy();
  persistWizState();
  wizState.stage = 'rooms-select';
  renderWizard();
}

function wizRoomInstanceHTML(inst){
  const rt = ROOM_TYPES.find(r=>r.typeId===inst.typeId)||{icon:'🏠'};

function wizAddRoomInstance(typeId, defaultName){
  const existing = wizState.roomInstances.filter(r=>r.typeId===typeId&&r.active!==false).length;
  const name = existing > 0 ? `${defaultName} ${existing+1}` : defaultName;
  const instanceId = `wiz_${typeId}_${Date.now()}`;
  wizState.roomInstances.push({typeId, name, instanceId, active:true});
  persistWizState();
  renderWizard();
  setTimeout(()=>{ const inp = document.getElementById(`wiz-inst-name-${instanceId}`); if(inp){inp.focus();inp.select();} }, 60);
}

function wizRenameInstance(instanceId, name){
  const inst = wizState.roomInstances.find(r=>r.instanceId===instanceId);
  if(inst && name.trim()) inst.name = name.trim();
  persistWizState();
}

function wizRemoveInstance(instanceId){
  const inst = wizState.roomInstances.find(r=>r.instanceId===instanceId);
  if(inst) inst.active = false;
  persistWizState();
  renderWizard();
}

function wizShowInactive(){
  wizState.roomInstances.forEach(r=>{ if(r.active===false) r.active=true; });

  renderWizard();
}

function wizRoomsSelectNext(){
  // Save any unsaved name inputs
  wizState.roomInstances.forEach(inst=>{

// ── STAGE 3: ROOM WALKTHROUGH ──────────────────────────────────────────────
function renderWizRoomsWalk(){
  const activeInsts = getActiveInstances();
  const inst = activeInsts[wizState.currentRoomIdx];
  if(!inst){ wizState.stage='summary'; renderWizard(); return ''; }

  const rt = ROOM_TYPES.find(r=>r.typeId===inst.typeId)||ROOM_TYPES[ROOM_TYPES.length-1];
  const chips = getChipsForType(inst.typeId);
  const extracted = wizState.extractedJobs[inst.instanceId]||[];
  const hasExtracted = extracted.length > 0;
  const savedNote = wizState.roomNotes[inst.instanceId]||'';

  // Suggested jobs from library for this room type
  const suggestedTypeIds = rt.suggestedJobs||[];
  const suggestedJobs = suggestedTypeIds.map(tid=>JOB_LIBRARY.find(j=>j.typeId===tid)).filter(Boolean);
  const skippedSet = new Set(wizState.skippedTemplateJobs[inst.instanceId]||[]);

  const suggestedSection = suggestedJobs.length ? `
    <div class="wiz-template-jobs">
      <div class="wiz-template-label">Suggested for ${inst.name} — untick anything that doesn't apply</div>
      ${suggestedJobs.map(j=>`
        <label style="display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;">
          <input type="checkbox" ${skippedSet.has(j.typeId)?'':'checked'}
            onchange="wizToggleTemplate('${inst.instanceId}','${j.typeId}',this.checked)"
            style="width:16px;height:16px;accent-color:var(--green);flex-shrink:0;">
          <span style="font-size:12px;color:${skippedSet.has(j.typeId)?'var(--slate2)':'var(--ink)'};font-weight:300;text-decoration:${skippedSet.has(j.typeId)?'line-through':'none'};flex:1;">${j.title}</span>
          <span style="font-size:10px;color:var(--slate2);flex-shrink:0;">${j.mins}m · ${j.freq}</span>
        </label>`).join('')}
    </div>` : '';

  const extractedSection = hasExtracted ? `
    <div class="wiz-extracted">
      <div class="wiz-extracted-label">Additional jobs found — edit or delete</div>
      <div id="wiz-job-list-${inst.instanceId}">
        ${extracted.map((j,i)=>wizJobRowHTML(inst.instanceId,i,j.text,j.freq)).join('')}
      </div>
      <div class="wiz-add-row">
        <input class="wiz-add-input" id="wiz-add-${inst.instanceId}" placeholder="Add a job I missed…" onkeydown="if(event.key==='Enter')wizAddJob('${inst.instanceId}')">
        <button class="wiz-add-btn" onclick="wizAddJob('${inst.instanceId}')">+</button>
      </div>
    </div>` : `<div id="wiz-extracted-area-${inst.instanceId}"></div>`;

  const pips = activeInsts.map((r,i)=>{
    const isDone = wizState.roomsDone.has(r.instanceId);
    const isActive = r.instanceId===inst.instanceId;
    const rtIcon = ROOM_TYPES.find(rt=>rt.typeId===r.typeId)?.icon||'🏠';
    return `<button class="wiz-pip ${isDone?'done':isActive?'active':''}">${rtIcon} ${r.name}</button>`;
  }).join('');

  return `
    <div class="wiz-pip-strip">${pips}</div>
    <div class="wiz-body" style="padding-top:20px;">
      <div class="wiz-eyebrow">Room ${wizState.currentRoomIdx+1} of ${activeInsts.length}</div>
      <div class="wiz-room-card">
        <div class="wiz-room-card-header">
          <span class="room-icon">${rt.icon}</span>
          <div>
            <div class="wiz-room-card-title">${inst.name}</div>
            <div class="wiz-room-card-sub">Walk through and note anything specific to this room.</div>
          </div>
        </div>
        ${suggestedSection}
        <div class="wiz-chips">
          ${chips.map(c=>`<button class="wiz-chip" onclick="wizAppendChip('${inst.instanceId}','${c}')">${c}</button>`).join('')}
        </div>
        <textarea class="wiz-textarea" id="wiz-ta-${inst.instanceId}"

function wizToggleTemplate(instanceId, typeId, checked){
  if(!wizState.skippedTemplateJobs[instanceId]) wizState.skippedTemplateJobs[instanceId]=[];
  const skipped = wizState.skippedTemplateJobs[instanceId];
  if(!checked){ if(!skipped.includes(typeId)) skipped.push(typeId); }
  else { const idx=skipped.indexOf(typeId); if(idx>-1) skipped.splice(idx,1); }
  const label = document.querySelector(`input[onchange*="${typeId}"]`);
  if(label){ const span=label.parentElement.querySelector('span'); if(span){ span.style.color=checked?'var(--ink)':'var(--slate2)'; span.style.textDecoration=checked?'none':'line-through'; } }
  persistWizState();
}

function wizAppendChip(instanceId, chip){
  const ta = document.getElementById(`wiz-ta-${instanceId}`);
  if(ta){ ta.value+=(ta.value&&!ta.value.endsWith(' ')?'. ':'')+chip+': '; ta.focus(); }
}

function wizAnalyseRoom(instanceId){
  const ta = document.getElementById(`wiz-ta-${instanceId}`);
  const text = ta ? ta.value.trim() : '';
  wizState.roomNotes[instanceId] = text;
  const inst = getActiveInstances().find(r=>r.instanceId===instanceId);
  const btn = document.getElementById(`wiz-analyse-${instanceId}`);
  if(btn){ btn.disabled=true; btn.textContent='Finding jobs…'; }
  const area = document.getElementById(`wiz-extracted-area-${instanceId}`)||document.querySelector('.wiz-extracted');
  if(area) area.innerHTML=`<div class="wiz-loading"><div class="wiz-spinner"></div>Reading what you said…</div>`;

  const keywords = {
    'grout':{text:'Re-grout tiles',freq:'annually'},'sealant':{text:'Re-seal sealant',freq:'annually'},
    'mould':{text:'Treat mould',freq:'monthly'},'damp':{text:'Check and treat damp',freq:'monthly'},
    'crack':{text:'Fill and paint cracks',freq:'one-off'},'paint':{text:'Repaint',freq:'annually'},
    'declutter':{text:'Full declutter',freq:'quarterly'},'clutter':{text:'Clear clutter',freq:'monthly'},
    'cable':{text:'Tidy and route cables',freq:'one-off'},'window':{text:'Clean windows',freq:'quarterly'},
    'blind':{text:'Clean blinds',freq:'monthly'},'curtain':{text:'Wash curtains',freq:'annually'},
    'carpet':{text:'Deep clean carpet',freq:'quarterly'},'floor':{text:'Scrub floor',freq:'monthly'},
    'skirting':{text:'Scrub skirting boards',freq:'monthly'},'radiator':{text:'Deep clean radiator',freq:'monthly'},
    'vent':{text:'Clean vent / extractor',freq:'monthly'},'cupboard':{text:'Clear and wipe cupboard',freq:'quarterly'},
    'drawer':{text:'Declutter drawers',freq:'quarterly'},'shelf':{text:'Clear and wipe shelves',freq:'monthly'},
    'door':{text:'Repair and repaint door',freq:'one-off'},'hinge':{text:'Fix door hinges',freq:'one-off'},
    'light':{text:'Clean light fitting',freq:'monthly'},'cobweb':{text:'Clear cobwebs',freq:'monthly'},
    'mirror':{text:'Clean mirror',freq:'fortnightly'},'tap':{text:'Descale taps',freq:'monthly'},
    'limescale':{text:'Descale fixtures',freq:'monthly'},'shower':{text:'Deep clean shower',freq:'fortnightly'},
    'bath':{text:'Scrub bath',freq:'fortnightly'},'toilet':{text:'Deep clean toilet',freq:'weekly'},
    'sink':{text:'Descale and clean sink',freq:'weekly'},'fridge':{text:'Deep clean fridge',freq:'quarterly'},
    'oven':{text:'Deep clean oven',freq:'quarterly'},'hob':{text:'Deep clean hob',freq:'monthly'},
    'extractor':{text:'Clean extractor fan',freq:'monthly'},'bin':{text:'Clean and disinfect bin',freq:'monthly'},
    'wardrobe':{text:'Clear and organise wardrobe',freq:'quarterly'},'weed':{text:'Weed this area',freq:'monthly'},
    'jetwash':{text:'Jetwash this area',freq:'annually'},'fence':{text:'Repair and treat fence',freq:'annually'},
    'gutter':{text:'Clear gutters',freq:'annually'},
  };

  const lowerText = text.toLowerCase();
  const foundJobs = [];
  const seen = new Set();
  Object.entries(keywords).forEach(([kw,job])=>{
    if(lowerText.includes(kw)&&!seen.has(job.text)){ foundJobs.push({...job}); seen.add(job.text); }
  });
  const lines = text.split(/[.,\n]+/).map(l=>l.trim()).filter(l=>l.length>5&&l.length<80);
  lines.forEach(line=>{
    const clean = line.replace(/^[-•*]\s*/,'').trim();
    if(clean&&!seen.has(clean)&&foundJobs.length<15){
      const alreadyCovered = Object.keys(keywords).some(kw=>clean.toLowerCase().includes(kw));
      if(!alreadyCovered){ foundJobs.push({text:clean.charAt(0).toUpperCase()+clean.slice(1),freq:'monthly'}); seen.add(clean); }
    }
  });
  if(!foundJobs.length) foundJobs.push({text:'',freq:'monthly'});
  wizState.extractedJobs[instanceId] = foundJobs;
  persistWizState();
  renderWizard();
}

function wizJobRowHTML(instanceId, i, text, freq){
  const freqs=['daily','weekly','fortnightly','monthly','quarterly','annually','one-off'];
  return `<div class="wiz-job-row" id="wiz-row-${instanceId}-${i}">
    <input class="wiz-job-input" id="wiz-jt-${instanceId}-${i}" value="${text.replace(/"/g,'&quot;')}">
    <select class="wiz-job-freq" id="wiz-jf-${instanceId}-${i}">
      ${freqs.map(f=>`<option value="${f}" ${freq===f?'selected':''}>${f}</option>`).join('')}
    </select>
    <button class="wiz-job-del" onclick="wizDelJob('${instanceId}',${i})">×</button>
  </div>`;
}

function wizDelJob(instanceId, i){
  const row=document.getElementById(`wiz-row-${instanceId}-${i}`); if(row) row.remove();
}

function wizAddJob(instanceId){
  const inp=document.getElementById(`wiz-add-${instanceId}`);
  if(!inp||!inp.value.trim()) return;
  const list=document.getElementById(`wiz-job-list-${instanceId}`);
  if(!list) return;
  const idx=Date.now();
  const div=document.createElement('div');
  div.innerHTML=wizJobRowHTML(instanceId,idx,inp.value.trim(),'monthly');
  list.appendChild(div.firstElementChild);
  inp.value='';
}

function wizCollectJobs(instanceId){
  const rows=document.querySelectorAll(`[id^="wiz-row-${instanceId}-"]`);
  const jobs=[];
  rows.forEach(row=>{
    const idx=row.id.replace(`wiz-row-${instanceId}-`,'');
    const t=document.getElementById(`wiz-jt-${instanceId}-${idx}`);
    const f=document.getElementById(`wiz-jf-${instanceId}-${idx}`);
    if(t&&t.value.trim()) jobs.push({text:t.value.trim(),freq:f?f.value:'monthly'});
  });
  return jobs;
}

function wizSaveRoom(instanceId){
  captureWizTextarea();
  if(wizState.extractedJobs[instanceId]) wizState.extractedJobs[instanceId]=wizCollectJobs(instanceId);
  wizState.roomsDone.add(instanceId);
  persistWizState();
  wizNextRoom();
}

function wizSkipRoom(){ captureWizTextarea(); wizNextRoom(); }

function wizNextRoom(){
  wizState.currentRoomIdx++;
  if(wizState.currentRoomIdx >= getActiveInstances().length) wizState.stage='summary';
  persistWizState();
  renderWizard();
}

function wizRoomBack(){
  captureWizTextarea();
  if(wizState.currentRoomIdx===0){ wizState.stage='rooms-select'; renderWizard(); return; }
  wizState.currentRoomIdx--;
  persistWizState();
  renderWizard();
}

function renderWizSummary(){
  const activeInsts = getActiveInstances();
  const allNew = Object.values(wizState.extractedJobs).flat().filter(j=>j.text);
  // Count suggested jobs that weren't skipped
  let suggestedCount = 0;
  activeInsts.forEach(inst=>{
    const rt = ROOM_TYPES.find(r=>r.typeId===inst.typeId);
    if(!rt) return;
    const skipped = new Set(wizState.skippedTemplateJobs[inst.instanceId]||[]);
    suggestedCount += (rt.suggestedJobs||[]).filter(tid=>!skipped.has(tid)).length;
  });
  return `
    <div class="wiz-body">
      <div class="wiz-eyebrow">Step 4 of 4</div>
      <h1 class="wiz-title">Almost <em>there</em></h1>
      <p class="wiz-sub">Here's what you've set up. Confirm to create your rooms and job list.</p>
      <div class="wiz-summary-grid">
        <div class="wiz-summary-card"><div class="wiz-summary-num">${activeInsts.length}</div><div class="wiz-summary-lbl">Rooms</div></div>
        <div class="wiz-summary-card"><div class="wiz-summary-num">${suggestedCount + allNew.length}</div><div class="wiz-summary-lbl">Jobs to start</div></div>
      </div>
      ${activeInsts.map(inst=>{
        const rt = ROOM_TYPES.find(r=>r.typeId===inst.typeId)||{icon:'🏠'};
        const skipped = new Set(wizState.skippedTemplateJobs[inst.instanceId]||[]);
        const jobCount = (ROOM_TYPES.find(r=>r.typeId===inst.typeId)?.suggestedJobs||[]).filter(t=>!skipped.has(t)).length + (wizState.extractedJobs[inst.instanceId]||[]).filter(j=>j.text).length;
        return `<div class="wiz-room-summary"><span class="wiz-room-summary-name">${rt.icon} ${inst.name}</span><span class="wiz-room-summary-count">${jobCount} job${jobCount!==1?'s':''}</span></div>`;
      }).join('')}
      ${wizState.whyStatement?`<div class="wiz-why-preview" style="margin-top:20px;"><div class="wiz-why-label">Your why</div><div class="wiz-why-text">${wizState.whyStatement}</div></div>`:''}
    </div>
    <div class="wiz-nav">
      <button class="wiz-btn-back" onclick="wizState.stage='rooms-walk';wizState.currentRoomIdx=0;renderWizard()">← Back</button>
      <button class="wiz-btn-next" onclick="wizConfirm()">Create my Hearth →</button>
    </div>
  `;
}

function wizConfirm(){
  const activeInsts = getActiveInstances();
  const TIER_MAP = {daily:'micro',weekly:'micro','2-3x week':'micro',fortnightly:'micro',monthly:'small',quarterly:'small',annually:'large','one-off':'large','as needed':'small'};

  // Create room records
  activeInsts.forEach(inst=>{
    if(!state.rooms) state.rooms=[];
    // Check if room already exists (revisit case)
    const existing = state.rooms.find(r=>r.id===inst.instanceId);
    if(existing){
      existing.name = inst.name;
      existing.active = true;
    } else {
      state.rooms.push({
        id: inst.instanceId,
        name: inst.name,
        typeId: inst.typeId,
        active: true,
        createdAt: today(),
      });
    }

    // Add suggested jobs (not skipped)
    const rt = ROOM_TYPES.find(r=>r.typeId===inst.typeId);
    const skipped = new Set(wizState.skippedTemplateJobs[inst.instanceId]||[]);
    (rt?.suggestedJobs||[]).forEach(typeId=>{
      if(skipped.has(typeId)) return;
      // Don't duplicate
      const alreadyExists = Object.values(state.jobs).some(j=>j.roomId===inst.instanceId&&j.typeId===typeId);
      if(alreadyExists) return;
      const lib = JOB_LIBRARY.find(j=>j.typeId===typeId);
      if(!lib) return;
      const id = `${inst.instanceId}_${typeId}_${Date.now()}_${Math.random().toString(36).slice(2,5)}`;
      state.jobs[id] = {
        id, title:lib.title, room:inst.name, roomId:inst.instanceId,
        typeId:lib.typeId, tier:lib.tier||TIER_MAP[lib.freq]||'small',
        freq:lib.freq, mins:lib.mins||30, notes:lib.notes||'', equip:[],
        last_done:null, assigned_to:'me', reset_count:0,
        status:'active', assigned_date:null, subtasks:[],
      };
    });

    // Add extracted jobs
    (wizState.extractedJobs[inst.instanceId]||[]).forEach((j,i)=>{
      if(!j.text.trim()) return;
      const id=`wiz_${inst.instanceId}_${Date.now()}_${i}`;
      state.jobs[id]={
        id,title:j.text,room:inst.name,roomId:inst.instanceId,
        typeId:'custom',tier:TIER_MAP[j.freq]||'small',
        freq:j.freq,mins:30,notes:'',equip:[],
        last_done:null,assigned_to:'me',reset_count:0,
        status:'active',assigned_date:null,subtasks:[],
      };
    });
  });

  // Deactivate rooms that were removed
  if(state.rooms){
    state.rooms.forEach(rm=>{
      const stillActive = activeInsts.find(i=>i.instanceId===rm.id);
      if(!stillActive) rm.active = false;
    });
  }

  state.mission = {...wizState.mission};
  state.whyStatement = wizState.whyStatement;
  state.wizardDone = true;
  state.wizState = null;
  state.scattered = false; // re-scatter on next load
  saveState();
  wizState.stage='welcome';
  renderWizard();
}
