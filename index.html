<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hearth</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1C1812;--ink2:#2A2318;--ink3:#3D3428;
  --cream:#F7F3ED;--warm:#EDE6D9;--warm2:#E2D9C8;
  --rust:#B85C3A;--rust2:#D4785A;--rust3:#8A3F24;
  --gold:#C49A3C;--gold2:#C49A3C;
  --green:#4A7C5F;--green2:#6B9E7E;--green3:#2E5C42;
  --slate:#7A6A55;--slate2:#9A8A75;
  --card:#FFFFFF;
  --bg:var(--cream);
  --surface:var(--warm);
  --border:rgba(28,24,18,0.10);
  --text:var(--ink);--text2:var(--slate);
  --shadow:rgba(28,24,18,0.10);
  --r:12px;--r2:8px;
}
html{height:100%;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  max-width:480px;
  margin:0 auto;
  position:relative;
}

/* NAV */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;
  position:sticky;top:0;z-index:100;
  background:var(--ink);
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.nav-logo{
  font-family:'DM Serif Display',serif;
  font-size:22px;color:var(--cream);letter-spacing:0.01em;
}
.nav-logo em{color:var(--rust2);font-style:italic;}
.nav-date{font-size:11px;color:rgba(255,255,255,0.45);font-weight:300;letter-spacing:0.05em;}

/* TAB BAR */
.tabbar{
  display:flex;
  background:var(--ink2);
  border-bottom:1px solid rgba(255,255,255,0.06);
  position:sticky;top:57px;z-index:99;
}
.tab-btn{
  flex:1;padding:11px 4px;
  font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:rgba(255,255,255,0.4);background:none;border:none;
  cursor:pointer;transition:color 0.2s;
  border-bottom:2px solid transparent;
}
.tab-btn.active{color:var(--cream);border-bottom-color:var(--rust2);}
.tab-btn:hover:not(.active){color:var(--cream);}

/* PANELS */
.panel{display:none;padding:20px 16px 100px;background:var(--cream);}
.panel.active{display:block;}

/* SECTION LABEL */
.section-label{
  font-size:10px;font-weight:500;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--slate);
  margin:20px 0 10px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--warm2);}

/* DISPATCH CARD */
.dispatch-card{
  background:var(--card);border-radius:var(--r);
  border:1px solid var(--border);
  box-shadow:0 2px 8px var(--shadow);
  overflow:hidden;margin-bottom:12px;
  animation:cardIn 0.3s ease;
}
@keyframes cardIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.card-header{
  padding:16px 18px 12px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:10px;
}
.card-room{
  font-size:10px;font-weight:500;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--slate);
  margin-bottom:5px;
}
.card-title{
  font-family:'DM Serif Display',serif;
  font-size:22px;color:var(--ink);line-height:1.15;
  flex:1;
}
.tier-badge{
  font-size:10px;font-weight:500;padding:3px 9px;
  border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:3px;
}
.t-micro{background:rgba(74,124,95,0.15);color:#2E5C42;}
.t-small{background:rgba(196,154,60,0.15);color:#8A6820;}
.t-large{background:rgba(184,92,58,0.15);color:#8A3F24;}
.t-major{background:rgba(160,64,64,0.15);color:#7A2020;}
.t-stepchange{background:rgba(130,100,200,0.15);color:#4A3A8A;}

.card-meta{
  padding:12px 18px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  border-bottom:1px solid var(--border);
  background:var(--warm);
}
.meta-item{display:flex;flex-direction:column;gap:2px;}
.meta-label{font-size:10px;color:var(--slate);font-weight:500;letter-spacing:0.06em;text-transform:uppercase;}
.meta-value{font-size:13px;color:var(--ink);font-weight:400;}
.meta-value.overdue{color:#B03030;}
.meta-value.due-soon{color:#8A6820;}

.card-notes{
  padding:12px 18px;
  font-size:13px;color:var(--slate);
  font-weight:300;line-height:1.55;
  border-bottom:1px solid var(--border);
}
.card-equipment{
  padding:10px 18px;
  display:flex;gap:6px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);
}
.equip-tag{
  font-size:11px;color:#8A6820;
  background:rgba(196,154,60,0.12);
  border-radius:20px;padding:3px 9px;
}

.reset-flag{
  padding:8px 18px;
  font-size:11px;color:#B03030;
  background:rgba(160,64,64,0.08);
  display:flex;align-items:center;gap:6px;
}
.reset-flag::before{content:'↺';font-size:13px;}

.card-actions{
  padding:14px 18px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
}
.card-actions-row2{
  padding:0 18px 14px;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
}
.btn{
  border:none;border-radius:var(--r2);
  padding:11px 10px;
  font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;
  cursor:pointer;transition:all 0.15s;
  text-align:center;
}
.btn:active{transform:scale(0.97);}
.btn-done{background:var(--green);color:white;}
.btn-done:hover{background:var(--green2);}
.btn-roulette{background:var(--rust);color:white;}
.btn-roulette:hover{background:var(--rust2);}
.btn-later{background:var(--warm2);color:var(--ink);}
.btn-later:hover{background:var(--warm);}
.btn-assign{background:rgba(196,154,60,0.15);color:#8A6820;}
.btn-assign:hover{background:rgba(196,154,60,0.25);}
.btn-small{font-size:11px;padding:9px 8px;}

/* EMPTY STATE */
.empty-state{
  text-align:center;padding:60px 20px;
  color:var(--slate);
}
.empty-state .big{
  font-family:'DM Serif Display',serif;
  font-size:32px;color:var(--green);
  margin-bottom:10px;
}
.empty-state p{font-size:13px;font-weight:300;line-height:1.6;}

/* STATS BAR */
.stats-bar{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
  margin-bottom:16px;
}
.stat-card{
  background:var(--card);border-radius:var(--r2);
  padding:10px 8px;text-align:center;
  border:1px solid var(--border);
  box-shadow:0 1px 4px var(--shadow);
}
.stat-num{font-size:20px;font-weight:500;color:var(--ink);}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:var(--slate);margin-top:2px;}

/* MODE SWITCHER */
.mode-bar{
  display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;
}
.mode-btn{
  flex:1;min-width:80px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r2);padding:9px 6px;
  font-family:'DM Sans',sans-serif;font-size:11px;
  font-weight:500;letter-spacing:0.05em;
  color:var(--slate);cursor:pointer;
  transition:all 0.15s;text-align:center;
}
.mode-btn.active{background:var(--rust);border-color:var(--rust);color:white;}
.mode-btn:hover:not(.active){background:var(--warm);color:var(--ink);}

/* TIME FILTER */
.time-filter{display:flex;gap:6px;margin-bottom:16px;}
.time-btn{
  flex:1;background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r2);padding:8px 4px;
  font-family:'DM Sans',sans-serif;font-size:11px;
  font-weight:500;color:var(--slate);cursor:pointer;
  transition:all 0.15s;text-align:center;
}
.time-btn.active{background:var(--gold);border-color:var(--gold);color:white;}
.time-btn:hover:not(.active){background:var(--warm);color:var(--ink);}

/* ROOM GRID */
.room-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.room-card{
  background:var(--card);border-radius:var(--r2);
  padding:14px 12px;
  border:1px solid var(--border);
  box-shadow:0 1px 4px var(--shadow);
  cursor:pointer;transition:all 0.15s;
}
.room-card:hover{border-color:var(--rust2);background:var(--warm);}
.room-card.selected{border-color:var(--rust);background:var(--warm);}
.room-name{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:4px;}
.room-count{font-size:11px;color:var(--slate);}
.room-due{font-size:11px;color:var(--rust);}

/* ASSIGNED */
.assigned-card{
  background:var(--card);border-radius:var(--r2);
  padding:14px 16px;margin-bottom:8px;
  border:1px solid var(--border);
  box-shadow:0 1px 4px var(--shadow);
  display:flex;align-items:flex-start;gap:10px;
}
.assigned-person{
  font-size:10px;font-weight:500;letter-spacing:0.08em;
  text-transform:uppercase;padding:3px 8px;
  border-radius:12px;white-space:nowrap;
  flex-shrink:0;margin-top:2px;
}
.p-nick{background:rgba(196,154,60,0.15);color:#8A6820;}
.p-boys{background:rgba(130,100,200,0.15);color:#4A3A8A;}
.assigned-info{flex:1;}
.assigned-title{font-size:14px;color:var(--ink);font-weight:400;margin-bottom:3px;}
.assigned-room{font-size:11px;color:var(--slate);}
.assigned-age{font-size:11px;color:var(--rust);margin-top:3px;}
.assigned-actions{display:flex;gap:6px;margin-top:10px;}
.btn-tiny{
  font-size:11px;padding:5px 10px;border-radius:20px;
  border:none;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-weight:500;transition:all 0.15s;
}
.btn-takeback{background:var(--warm2);color:var(--ink);}
.btn-markedone{background:rgba(74,124,95,0.15);color:#2E5C42;}
.btn-nudge{background:rgba(196,154,60,0.15);color:#8A6820;}

/* STEP CHANGE */
.stepchange-card{
  background:linear-gradient(135deg,rgba(130,100,200,0.08),rgba(100,70,170,0.04));
  border:1px solid rgba(130,100,200,0.2);
  border-radius:var(--r);padding:20px 18px;margin-bottom:12px;
}
.sc-eyebrow{
  font-size:10px;font-weight:500;letter-spacing:0.1em;
  text-transform:uppercase;color:#4A3A8A;margin-bottom:8px;
}
.sc-title{
  font-family:'DM Serif Display',serif;
  font-size:20px;color:var(--ink);line-height:1.2;margin-bottom:8px;
}
.sc-note{font-size:13px;color:var(--slate);font-weight:300;line-height:1.55;margin-bottom:14px;}
.sc-actions{display:flex;gap:8px;}
.btn-sc-done{background:rgba(130,100,200,0.15);color:#4A3A8A;border-radius:var(--r2);padding:9px 16px;font-size:12px;font-weight:500;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-sc-snooze{background:var(--warm2);color:var(--slate);border-radius:var(--r2);padding:9px 16px;font-size:12px;font-weight:500;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ASSIGN MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:200;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity 0.2s;
}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{
  background:var(--cream);border-radius:var(--r) var(--r) 0 0;
  padding:20px 20px 40px;width:100%;
  transform:translateY(100%);transition:transform 0.3s ease;
  border-top:1px solid var(--border);
  box-shadow:0 -4px 20px rgba(28,24,18,0.15);
}
.modal-overlay.show .modal{transform:translateY(0);}
.modal-title{
  font-family:'DM Serif Display',serif;
  font-size:20px;color:var(--ink);margin-bottom:6px;
}
.modal-job{font-size:13px;color:var(--slate);margin-bottom:18px;font-weight:300;}
.assign-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.assign-opt{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:14px;text-align:center;
  cursor:pointer;transition:all 0.15s;
  box-shadow:0 1px 4px var(--shadow);
}
.assign-opt:hover{background:var(--warm);border-color:var(--rust2);}
.assign-opt-name{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:3px;}
.assign-opt-note{font-size:11px;color:var(--slate);}
.modal-cancel{
  width:100%;padding:12px;background:none;border:1px solid var(--border);
  border-radius:var(--r2);color:var(--slate);font-family:'DM Sans',sans-serif;
  font-size:13px;cursor:pointer;
}

/* PROGRESS BAR */
.progress-wrap{
  padding:10px 18px 0;
}
.progress-label{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:5px;
}
.progress-label-text{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--slate);}
.progress-label-count{font-size:11px;color:var(--ink);font-weight:500;}
.progress-bar-track{
  height:5px;background:var(--warm2);border-radius:3px;overflow:hidden;
}
.progress-bar-fill{
  height:100%;background:var(--green);border-radius:3px;
  transition:width 0.3s ease;
}

/* CHUNK LIST */
.chunk-list{
  padding:8px 18px 12px;border-bottom:1px solid var(--border);
}
.chunk-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 0;border-bottom:1px solid var(--warm2);
}
.chunk-item:last-child{border-bottom:none;}
.chunk-check{
  width:20px;height:20px;border-radius:50%;
  border:1.5px solid var(--warm2);background:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all 0.15s;font-size:11px;
  color:transparent;
}
.chunk-check.done{background:var(--green);border-color:var(--green);color:white;}
.chunk-check:hover:not(.done){border-color:var(--green);color:var(--green2);}
.chunk-info{flex:1;}
.chunk-name{font-size:13px;color:var(--ink);font-weight:400;}
.chunk-name.done{color:var(--slate2);text-decoration:line-through;}
.chunk-date{font-size:10px;color:var(--slate2);margin-top:1px;}

/* DO A BIT BUTTON */
.btn-doabit{background:linear-gradient(135deg,var(--rust),var(--rust3));color:white;}
.btn-doabit:hover{opacity:0.9;}

/* AVAILABLE JOBS SECTION */
.available-section{margin-top:20px;}
.available-job{
  background:var(--card);border-radius:var(--r2);
  padding:12px 14px;margin-bottom:8px;
  border:1px solid var(--border);
  box-shadow:0 1px 4px var(--shadow);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  cursor:pointer;transition:all 0.15s;
}
.available-job:hover{border-color:var(--rust2);background:var(--warm);}
.available-job-info{flex:1;}
.available-job-title{font-size:13px;color:var(--ink);font-weight:400;margin-bottom:2px;}
.available-job-meta{font-size:11px;color:var(--slate);}
.available-job-due{font-size:11px;color:var(--slate2);white-space:nowrap;flex-shrink:0;}

/* CHUNK EDITOR (in Settings) */
.chunk-editor-section{margin-top:14px;border-top:1px solid var(--warm2);padding-top:14px;}
.chunk-editor-title{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--slate);margin-bottom:10px;}
.chunk-editor-item{
  display:flex;align-items:center;gap:8px;
  margin-bottom:8px;
}
.chunk-editor-item input{
  flex:1;border:1.5px solid var(--warm2);border-radius:var(--r2);
  padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:13px;
  background:var(--cream);color:var(--ink);outline:none;
}
.chunk-editor-item input:focus{border-color:var(--rust2);}
.chunk-del{
  background:none;border:1px solid var(--warm2);border-radius:6px;
  color:var(--slate);font-size:13px;padding:6px 9px;
  cursor:pointer;transition:all 0.15s;flex-shrink:0;
}
.chunk-del:hover{border-color:var(--rust);color:var(--rust);}
.chunk-add-btn{
  width:100%;background:rgba(74,124,95,0.1);color:var(--green3);
  border:1px dashed rgba(74,124,95,0.3);border-radius:var(--r2);
  padding:9px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:all 0.15s;margin-top:4px;
}
.chunk-add-btn:hover{background:rgba(74,124,95,0.18);}

/* ── WIZARD ────────────────────────────────────────────────────────────── */
.wiz-screen{max-width:480px;margin:0 auto;padding:0 0 100px;}
.wiz-header{
  background:var(--ink);padding:20px 20px 16px;
  position:sticky;top:0;z-index:10;
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:space-between;
}
.wiz-logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--cream);}
.wiz-logo em{color:var(--rust2);font-style:italic;}
.wiz-skip{font-size:11px;color:rgba(255,255,255,0.4);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:6px 0;}
.wiz-skip:hover{color:rgba(255,255,255,0.7);}
.wiz-progress{height:3px;background:var(--warm2);}
.wiz-progress-fill{height:100%;background:var(--rust);transition:width 0.4s ease;}
.wiz-body{padding:28px 20px 20px;}
.wiz-eyebrow{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--slate);margin-bottom:12px;}
.wiz-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--ink);line-height:1.2;margin-bottom:8px;}
.wiz-title em{color:var(--rust2);font-style:italic;}
.wiz-sub{font-size:13px;color:var(--slate);font-weight:300;line-height:1.6;margin-bottom:24px;}

/* Mission questions */
.wiz-question{margin-bottom:20px;}
.wiz-question label{display:block;font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--slate);margin-bottom:6px;}
.wiz-question textarea{
  width:100%;border:1.5px solid var(--warm2);border-radius:var(--r2);
  padding:12px 14px;font-family:'DM Serif Display',serif;font-size:16px;
  color:var(--ink);background:var(--card);outline:none;resize:none;
  min-height:72px;line-height:1.4;
}
.wiz-question textarea:focus{border-color:var(--rust2);background:#fff;}
.wiz-question textarea::placeholder{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--slate2);}

/* Why statement preview */
.wiz-why-preview{
  background:var(--ink);border-radius:var(--r);padding:18px 20px;
  margin-bottom:20px;border-left:3px solid var(--rust2);
}
.wiz-why-label{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.wiz-why-text{font-family:'DM Serif Display',serif;font-size:16px;color:var(--cream);line-height:1.4;font-style:italic;}

/* Room selection */
.wiz-room-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.wiz-room-tile{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--r2);
  padding:12px 10px;cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;gap:8px;position:relative;
}
.wiz-room-tile.excluded{opacity:0.35;background:var(--warm);}
.wiz-room-tile:hover:not(.excluded){border-color:var(--rust2);}
.wiz-room-icon{font-size:18px;flex-shrink:0;}
.wiz-room-name{font-size:12px;font-weight:500;color:var(--ink);flex:1;line-height:1.3;}
.wiz-room-remove{
  position:absolute;top:6px;right:6px;
  width:18px;height:18px;border-radius:50%;
  background:rgba(184,92,58,0.15);color:var(--rust);
  border:none;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.15s;line-height:1;
}
.wiz-room-tile:hover .wiz-room-remove{opacity:1;}
.wiz-room-tile.excluded .wiz-room-remove{opacity:1;background:rgba(74,124,95,0.15);color:var(--green);}

/* Room diagnostic card */
.wiz-room-card{
  background:var(--card);border-radius:var(--r);
  border:1px solid var(--border);box-shadow:0 2px 8px var(--shadow);
  margin-bottom:16px;overflow:hidden;
}
.wiz-room-card-header{
  background:var(--ink2);padding:14px 18px;
  display:flex;align-items:center;gap:10px;
}
.wiz-room-card-header .room-icon{font-size:20px;}
.wiz-room-card-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--cream);}
.wiz-room-card-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;}
.wiz-chips{padding:12px 16px;background:rgba(184,92,58,0.05);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;}
.wiz-chip{
  font-size:11px;color:var(--rust3);background:rgba(184,92,58,0.1);
  border-radius:20px;padding:4px 10px;cursor:pointer;
  transition:background 0.15s;border:none;font-family:'DM Sans',sans-serif;
}
.wiz-chip:hover{background:rgba(184,92,58,0.2);}
.wiz-textarea{
  width:100%;border:none;border-bottom:1px solid var(--border);
  padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:13px;
  color:var(--ink);background:var(--card);outline:none;resize:none;
  min-height:80px;line-height:1.55;font-weight:300;
}
.wiz-textarea::placeholder{color:var(--slate2);}
.wiz-room-actions{padding:12px 16px;display:flex;gap:8px;}
.wiz-btn-analyse{
  flex:1;background:var(--rust);color:white;border:none;border-radius:var(--r2);
  padding:11px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;
  transition:background 0.15s;
}
.wiz-btn-analyse:hover{background:var(--rust2);}
.wiz-btn-analyse:disabled{opacity:0.5;cursor:not-allowed;}
.wiz-btn-skip{
  background:var(--warm2);color:var(--slate);border:none;border-radius:var(--r2);
  padding:11px 16px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;
}

/* Template job preview */
.wiz-template-jobs{padding:10px 16px;background:rgba(74,124,95,0.04);border-bottom:1px solid var(--border);}
.wiz-template-label{font-size:10px;color:var(--green3);font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;}
.wiz-template-item{font-size:12px;color:var(--slate);padding:3px 0;display:flex;align-items:center;gap:6px;}
.wiz-template-item::before{content:'✓';color:var(--green2);font-size:11px;flex-shrink:0;}

/* Extracted jobs */
.wiz-extracted{padding:12px 16px 16px;border-top:1px solid var(--border);}
.wiz-extracted-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--slate);margin-bottom:10px;}
.wiz-job-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--warm2);}
.wiz-job-row:last-of-type{border-bottom:none;}
.wiz-job-input{flex:1;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);font-weight:300;outline:none;padding:2px 0;}
.wiz-job-input:focus{background:var(--warm);padding:2px 6px;border-radius:4px;}
.wiz-job-freq{border:1px solid var(--warm2);border-radius:6px;padding:3px 6px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--slate);background:var(--warm);outline:none;cursor:pointer;flex-shrink:0;}
.wiz-job-del{background:none;border:none;color:var(--warm2);cursor:pointer;font-size:16px;padding:2px 4px;transition:color 0.15s;flex-shrink:0;}
.wiz-job-del:hover{color:var(--rust);}
.wiz-add-row{display:flex;gap:6px;margin-top:8px;}
.wiz-add-input{flex:1;border:1px dashed var(--warm2);border-radius:6px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);background:none;outline:none;}
.wiz-add-input:focus{border-color:var(--rust2);border-style:solid;}
.wiz-add-btn{background:none;border:1px dashed var(--warm2);border-radius:6px;padding:7px 12px;font-size:14px;cursor:pointer;color:var(--slate);transition:all 0.15s;}
.wiz-add-btn:hover{border-color:var(--green);color:var(--green);}
.wiz-spinner{width:14px;height:14px;border:2px solid var(--warm2);border-top-color:var(--rust);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;margin-right:8px;}
.wiz-loading{display:flex;align-items:center;padding:14px 0;color:var(--slate);font-size:13px;font-weight:300;}

/* Summary */
.wiz-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.wiz-summary-card{background:var(--card);border-radius:var(--r2);padding:14px;border:1px solid var(--border);text-align:center;}
.wiz-summary-num{font-family:'DM Serif Display',serif;font-size:32px;color:var(--ink);}
.wiz-summary-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--slate);margin-top:2px;}
.wiz-room-summary{background:var(--card);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.wiz-room-summary-name{font-size:13px;color:var(--ink);font-weight:400;}
.wiz-room-summary-count{font-size:12px;color:var(--slate);}

/* Nav/footer */
.wiz-nav{padding:16px 20px;display:flex;gap:10px;position:sticky;bottom:0;background:var(--cream);border-top:1px solid var(--border);}
.wiz-btn-next{flex:1;background:var(--rust);color:white;border:none;border-radius:var(--r2);padding:14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.15s;}
.wiz-btn-next:hover{background:var(--rust2);}
.wiz-btn-back{background:var(--warm2);color:var(--slate);border:none;border-radius:var(--r2);padding:14px 18px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
.wiz-btn-pause{background:none;border:1px solid var(--warm2);color:var(--slate);border-radius:var(--r2);padding:14px 14px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;}

/* Room pip strip */
.wiz-pip-strip{display:flex;gap:4px;padding:10px 20px;background:var(--ink2);overflow-x:auto;scrollbar-width:none;}
.wiz-pip-strip::-webkit-scrollbar{display:none;}
.wiz-pip{flex-shrink:0;font-size:9px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;padding:4px 8px;border-radius:20px;color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.06);cursor:pointer;white-space:nowrap;transition:all 0.2s;border:none;font-family:'DM Sans',sans-serif;}
.wiz-pip.active{background:var(--rust);color:white;}
.wiz-pip.done{background:var(--green);color:white;}

/* Welcome screen */
.wiz-welcome-feature{background:var(--card);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px;border:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.wiz-welcome-icon{font-size:20px;flex-shrink:0;margin-top:2px;}
.wiz-welcome-title{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:3px;}
.wiz-welcome-desc{font-size:12px;color:var(--slate);font-weight:300;line-height:1.5;}

/* ── SUBTASKS ──────────────────────────────────────────────────────────── */
.subtask-list{padding:8px 18px 12px;border-bottom:1px solid var(--border);}
.subtask-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--warm2);}
.subtask-item:last-child{border-bottom:none;}
.subtask-check{
  width:22px;height:22px;border-radius:50%;border:1.5px solid var(--warm2);
  background:none;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all 0.15s;font-size:11px;color:transparent;margin-top:1px;
}
.subtask-check.done{background:var(--green);border-color:var(--green);color:white;}
.subtask-check.locked{opacity:0.35;cursor:default;}
.subtask-check:hover:not(.done):not(.locked){border-color:var(--green);color:var(--green);}
.subtask-info{flex:1;}
.subtask-name{font-size:13px;color:var(--ink);font-weight:400;}
.subtask-name.done{color:var(--slate2);text-decoration:line-through;}
.subtask-meta{font-size:10px;color:var(--slate2);margin-top:2px;}
.subtask-date{font-size:10px;color:var(--green3);margin-top:1px;}
.subtask-breadcrumb{
  font-size:10px;color:var(--rust3);font-weight:500;
  letter-spacing:0.05em;background:rgba(184,92,58,0.08);
  border-radius:4px;padding:2px 6px;display:inline-block;margin-bottom:4px;
}
.subtask-dependent-badge{
  font-size:10px;color:var(--slate);background:var(--warm2);
  border-radius:4px;padding:2px 7px;display:inline-flex;align-items:center;gap:4px;
  margin-bottom:8px;
}
.subtask-nudge{
  background:rgba(184,92,58,0.08);border-left:3px solid var(--rust);
  padding:8px 14px;margin:0 18px 8px;border-radius:0 var(--r2) var(--r2) 0;
  font-size:12px;color:var(--rust3);
}
/* Editor subtask section */
.subtask-editor-wrap{border-top:1px solid var(--warm2);margin-top:14px;padding-top:14px;}
.subtask-editor-title{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--slate);margin-bottom:10px;}
.subtask-type-toggle{display:flex;gap:6px;margin-bottom:12px;}
.subtask-type-btn{flex:1;padding:8px;border-radius:var(--r2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;border:1.5px solid var(--warm2);background:none;color:var(--slate);}
.subtask-type-btn.active{border-color:var(--rust);color:var(--rust);background:rgba(184,92,58,0.08);}
.subtask-editor-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.subtask-editor-row input{flex:1;border:1.5px solid var(--warm2);border-radius:var(--r2);padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--cream);color:var(--ink);outline:none;}
.subtask-editor-row input:focus{border-color:var(--rust2);}
.subtask-mins-input{width:60px!important;flex:none!important;text-align:center;}
.subtask-add-btn{background:rgba(74,124,95,0.1);color:var(--green3);border:1px dashed rgba(74,124,95,0.3);border-radius:var(--r2);padding:9px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;width:100%;margin-top:4px;}
.subtask-add-btn:hover{background:rgba(74,124,95,0.18);}

/* DONE TOAST */
.toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--green);color:white;
  border-radius:24px;padding:10px 20px;
  font-size:13px;font-weight:500;
  opacity:0;transition:all 0.3s;
  pointer-events:none;white-space:nowrap;z-index:300;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* EXPORT */
.export-btn{
  width:100%;margin-top:8px;
  background:rgba(196,154,60,0.12);color:#8A6820;
  border:1px solid rgba(196,154,60,0.3);
  border-radius:var(--r2);padding:12px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:all 0.15s;
}
.export-btn:hover{background:rgba(196,154,60,0.2);}
.import-row{display:flex;gap:8px;margin-top:8px;}

/* JOB EDITOR */
.editor-search{
  width:100%;border:1.5px solid var(--warm2);border-radius:var(--r2);
  padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;
  background:var(--card);color:var(--ink);outline:none;margin-bottom:12px;
}
.editor-search:focus{border-color:var(--rust2);}
.editor-job-list{max-height:260px;overflow-y:auto;margin-bottom:16px;}
.editor-job-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:11px 14px;margin-bottom:6px;
  cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;justify-content:space-between;
}
.editor-job-item:hover{border-color:var(--rust2);background:var(--warm);}
.editor-job-item.selected{border-color:var(--rust);background:var(--warm);}
.editor-job-name{font-size:13px;color:var(--ink);font-weight:400;}
.editor-job-room{font-size:11px;color:var(--slate);margin-top:2px;}
.editor-form{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;
  box-shadow:0 2px 8px var(--shadow);
}
.editor-form label{
  display:block;font-size:10px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--slate);margin-bottom:4px;margin-top:12px;
}
.editor-form label:first-child{margin-top:0;}
.editor-form input,.editor-form select,.editor-form textarea{
  width:100%;border:1.5px solid var(--warm2);border-radius:var(--r2);
  padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:13px;
  background:var(--cream);color:var(--ink);outline:none;
}
.editor-form input:focus,.editor-form select:focus,.editor-form textarea:focus{border-color:var(--rust2);}
.editor-form textarea{min-height:70px;resize:vertical;}
.editor-save{
  width:100%;margin-top:14px;
  background:var(--rust);color:white;border:none;
  border-radius:var(--r2);padding:12px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:background 0.15s;
}
.editor-save:hover{background:var(--rust2);}
.editor-reset-job{
  width:100%;margin-top:8px;
  background:none;color:var(--slate);border:1px solid var(--warm2);
  border-radius:var(--r2);padding:10px;
  font-family:'DM Sans',sans-serif;font-size:12px;
  cursor:pointer;transition:all 0.15s;
}
.editor-reset-job:hover{border-color:var(--rust);color:var(--rust);}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo"><em>Hearth</em> <span style="font-size:11px;color:rgba(212,120,90,0.5);font-family:'DM Sans',sans-serif;font-weight:300;letter-spacing:0.05em;">v6.02</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div id="sync-indicator" style="width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background 0.5s;" title="Syncing…"></div>
    <div class="nav-date" id="nav-date"></div>
  </div>
</div>

<div class="tabbar">

  <button class="tab-btn" onclick="showTab('roulette')">Roulette</button>
  <button class="tab-btn" onclick="showTab('rooms')">Rooms</button>
  <button class="tab-btn" onclick="showTab('assigned')">Assigned</button>
  <button class="tab-btn" onclick="showTab('stepchange')">Step Change</button>
  <button class="tab-btn" onclick="showTab('settings')">Settings</button>

    <button class="time-btn active" onclick="setTime(30,this)">Under 30m</button>
    <button class="time-btn" onclick="setTime(60,this)">Under 1hr</button>
    <button class="time-btn" onclick="setTime(180,this)">1–3 hrs</button>
    <button class="time-btn" onclick="setTime(999,this)">Project</button>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setRouletteMode('any',this)">Any room</button>
    <button class="mode-btn" onclick="setRouletteMode('room',this)">This room</button>
  </div>
  <div id="roulette-room-select" style="display:none;margin-bottom:12px;">
    <select id="roulette-room-picker" style="width:100%;background:var(--ink2);color:var(--cream);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r2);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;">
    </select>
  </div>
  <div id="roulette-content"></div>
  <button class="btn btn-roulette" style="width:100%;margin-top:8px;padding:14px;" onclick="spinRoulette()">Spin the wheel</button>

<!-- ROOMS -->
<div id="tab-rooms" class="panel">
  <div class="room-grid" id="room-grid"></div>
  <div id="room-jobs-content"></div>
</div>

<!-- ASSIGNED -->
<div id="tab-assigned" class="panel">
  <div id="assigned-all-content"></div>
</div>

<!-- STEP CHANGE -->
<div id="tab-stepchange" class="panel">
  <div class="section-label">This fortnight — one thought</div>
  <div id="stepchange-content"></div>
  <div class="section-label">Upcoming</div>
  <div id="stepchange-upcoming"></div>
</div>

<!-- SETTINGS -->
<div id="tab-settings" class="panel">
  <div class="section-label">Setup & mission</div>
  <button class="export-btn" style="background:rgba(28,24,18,0.05);color:var(--ink);border-color:var(--warm2);margin-bottom:8px;" onclick="showAbout()">? About Hearth</button>
  <button class="export-btn" style="background:rgba(184,92,58,0.1);color:var(--rust);border-color:rgba(184,92,58,0.3);margin-bottom:8px;" onclick="launchWizardAtStage('mission')">✎ Edit my mission statement</button>
  <button class="export-btn" style="background:rgba(184,92,58,0.1);color:var(--rust);border-color:rgba(184,92,58,0.3);" onclick="launchWizardAtStage('rooms-select')">↺ Re-run room walkthrough</button>

  <div class="section-label" style="margin-top:28px;">Edit a job</div>
  <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;">
    <input class="editor-search" id="editor-search" placeholder="Search jobs…" oninput="filterEditorJobs()" autocomplete="off" style="flex:1;min-width:120px;margin-bottom:0;">
    <select id="editor-filter-room" onchange="filterEditorJobs()" style="border:1.5px solid var(--warm2);border-radius:var(--r2);padding:9px 8px;font-family:'DM Sans',sans-serif;font-size:12px;background:var(--card);color:var(--ink);outline:none;flex-shrink:0;">
      <option value="">All rooms</option>
    </select>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:12px;">
    <select id="editor-filter-tier" onchange="filterEditorJobs()" style="flex:1;border:1.5px solid var(--warm2);border-radius:var(--r2);padding:8px;font-family:'DM Sans',sans-serif;font-size:12px;background:var(--card);color:var(--ink);outline:none;">
      <option value="">All tiers</option>
      <option value="micro">Micro</option>
      <option value="small">Small</option>
      <option value="large">Large</option>
      <option value="major">Major</option>
      <option value="stepchange">Step Change</option>
    </select>
    <select id="editor-filter-sort" onchange="filterEditorJobs()" style="flex:1;border:1.5px solid var(--warm2);border-radius:var(--r2);padding:8px;font-family:'DM Sans',sans-serif;font-size:12px;background:var(--card);color:var(--ink);outline:none;">
      <option value="room">Sort by room</option>
      <option value="due">Sort by due date</option>
      <option value="title">Sort by name</option>
    </select>
  </div>
  <div class="editor-job-list" id="editor-job-list"></div>
  <div id="editor-form-wrap"></div>

  <div class="section-label" style="margin-top:28px;">Assignees</div>

  <div style="display:flex;gap:8px;margin-top:8px;">
    <input id="new-assignee-input" placeholder="Add a name…" style="flex:1;border:1.5px solid var(--warm2);border-radius:var(--r2);padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--card);color:var(--ink);outline:none;" onkeydown="if(event.key==='Enter')addAssignee()">
    <button onclick="addAssignee()" style="background:var(--green);color:white;border:none;border-radius:var(--r2);padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;">Add</button>
  </div>

  <div class="section-label" style="margin-top:28px;">Account</div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:8px;">
    <div style="font-size:11px;color:var(--slate);margin-bottom:4px;">Signed in as</div>
    <div style="font-size:14px;color:var(--ink);font-weight:500;" id="account-key-display"></div>

  <button class="export-btn" onclick="exportData()">↓ Export backup to Files / iCloud</button>
  <div class="import-row">
    <label style="flex:1;background:var(--warm);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;font-size:13px;color:var(--slate);cursor:pointer;text-align:center;">

  <button class="editor-reset-job" onclick="reScatter()" style="width:100%;margin-bottom:8px;">↺ Re-scatter job dates (overdue/unscheduled only)</button>
  <button class="editor-reset-job" onclick="resetAllData()" style="width:100%;color:#B03030;border-color:#E8C0C0;">⚠ Reset all data — start fresh</button>
</div>

<!-- WIZARD OVERLAY -->
<div id="wizard-overlay" style="display:none;position:fixed;inset:0;background:var(--cream);z-index:500;overflow-y:auto;"></div>

<div class="modal-overlay" id="assign-modal">

async function sbLoad(userKey){
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/hearth_state?user_key=eq.${encodeURIComponent(userKey)}&select=state`,
    {headers: SB_HEADERS}
  );
  const rows = await res.json();
  return rows.length ? rows[0].state : null;
}

async function sbSave(userKey, stateObj){
  await fetch(`${SUPABASE_URL}/rest/v1/hearth_state`, {
    method: 'POST',
    headers: SB_HEADERS,
    body: JSON.stringify({user_key: userKey, state: stateObj, updated_at: new Date().toISOString()})
  });
}

// ── STATE ──────────────────────────────────────────────────────────────────
// localStorage is used as a fast local cache — Supabase is the source of truth.
// On load: check Supabase first, fall back to local cache if offline.
// On save: write to both immediately.

function loadLocalState(){
  try{return JSON.parse(localStorage.getItem('hearth_v1')||'{}');}catch{return {};}
}
function saveLocalState(){
  try{localStorage.setItem('hearth_v1',JSON.stringify(state));}catch{}
}

let userKey = localStorage.getItem('hearth_user_key') || null;
let state = loadLocalState();
let supabaseSynced = false;

// Debounced cloud save — batches rapid changes into one write
let saveTimer = null;
function saveState(){
  saveLocalState(); // always instant
  setSyncDot('syncing');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    if(userKey){
      sbSave(userKey, state)
        .then(()=>setSyncDot('synced'))
        .catch(()=>setSyncDot(''));
    }
  }, 1500);
}

// ── USER KEY SETUP SCREEN ──────────────────────────────────────────────────
function showKeySetup(){
  // Overlay on top of existing DOM — never wipe body
  const overlay = document.createElement('div');
  overlay.id = 'key-setup-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:#1C1812;display:flex;align-items:center;justify-content:center;padding:24px;z-index:9999;';
  overlay.innerHTML = `
    <div style="background:#F7F3ED;border-radius:16px;padding:32px 24px;max-width:360px;width:100%;text-align:center;">
      <div style="font-family:'DM Serif Display',serif;font-size:28px;color:#1C1812;margin-bottom:6px;"><em style="color:#D4785A;">Hearth</em></div>
      <div style="font-size:13px;color:#7A6A55;margin-bottom:28px;font-weight:300;line-height:1.5;">Your data lives in the cloud now.<br>Choose a personal key to identify your account.</div>
      <div style="text-align:left;margin-bottom:16px;">
        <label style="font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#7A6A55;display:block;margin-bottom:6px;">Your key — something memorable</label>
        <input id="key-input" placeholder="e.g. sunflower-house-42" style="width:100%;border:1.5px solid #E2D9C8;border-radius:8px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:#1C1812;background:#fff;outline:none;" autocomplete="off" autocapitalize="off">
        <div style="font-size:11px;color:#9A8A75;margin-top:6px;line-height:1.5;">Not a password — just a phrase you'll remember. Lowercase, no spaces. This is how Hearth finds your data on any device.</div>
      </div>
      <button id="key-submit-btn" style="width:100%;background:#B85C3A;color:white;border:none;border-radius:8px;padding:14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:10px;">Start Hearth →</button>
      <div id="key-error" style="font-size:12px;color:#B03030;min-height:18px;"></div>
    </div>
  `;
  document.body.appendChild(overlay);
  const input = document.getElementById('key-input');
  const btn = document.getElementById('key-submit-btn');
  input.focus();
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') confirmUserKey(); });
  btn.addEventListener('click', confirmUserKey);
}

async function confirmUserKey(){
  const raw = document.getElementById('key-input').value.trim().toLowerCase().replace(/\s+/g,'-');
  const errEl = document.getElementById('key-error');
  const btn = document.getElementById('key-submit-btn');
  if(raw.length < 4){
    errEl.textContent = 'Please use at least 4 characters.';
    return;
  }
  btn.textContent = 'Checking…';
  btn.disabled = true;

  try{
    const existing = await sbLoad(raw);
    localStorage.setItem('hearth_user_key', raw);
    userKey = raw;
    if(existing){
      state = existing;
      saveLocalState();
      showToast('Welcome back ✓');
    } else {
      await sbSave(raw, state);
      showToast('Account created ✓');
    }
    supabaseSynced = true;
    // Remove overlay and render app
    const overlay = document.getElementById('key-setup-overlay');
    if(overlay) overlay.remove();
    initState();
    renderDispatch();
    setSyncDot('synced');
    const keyDisplay = document.getElementById('account-key-display');
    if(keyDisplay) keyDisplay.textContent = userKey;
  } catch(err){
    errEl.textContent = 'Could not connect — check your internet and try again.';
    btn.textContent = 'Start Hearth →';
    btn.disabled = false;
  }
}

}
function dueDate(job){
  if(!job.last_done) return today(); // never done = due now
  const days = FREQ_DAYS[job.freq]||0;
  if(days===0) return null; // one-off done
  const d = new Date(job.last_done);
  d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}
function isDue(job){
  if(job.status==='assigned'||job.status==='done') return false;
  if(job.tier==='stepchange') return false;
  if(job.wizSkipped) return false;
  if(job.suppressed_until && job.suppressed_until > today()) return false;
  if(job.roomId){ const rm=getRoomById(job.roomId); if(rm&&!rm.active) return false; }
  else if(job.room&&state.rooms&&state.rooms.length){ const rm=state.rooms.find(r=>r.name===job.room); if(rm&&!rm.active) return false; }
  const dd = dueDate(job);
  if(!dd) return false;
  return dd <= today();
}
function daysOverdue(job){
  const dd = dueDate(job);
  if(!dd) return 0;
  return Math.max(0, daysBetween(dd, today()));
}
function lastDoneLabel(job){
  if(!job.last_done) return 'Never done';
  const days = daysBetween(job.last_done, today());
  if(days===0) return 'Done today';
  if(days===1) return 'Done yesterday';
  return `Done ${days} days ago`;
}
function dueDateLabel(job){
  const dd = dueDate(job);
  if(!dd) return '—';
  const days = daysBetween(today(), dd);
  if(days<0) return `${Math.abs(days)}d overdue`;
  if(days===0) return 'Due today';
  return `Due in ${days}d`;
}

// ── SUBTASK SYSTEM ─────────────────────────────────────────────────────────
// Replaces the old chunk system.
// Each job has job.subtasks = [] array. subtasks are either:
//   independent: appear separately in dispatch/roulette in sequence
//   dependent:   appear as a bundle, must be done within DEPENDENT_WINDOW_DAYS
const DEPENDENT_WINDOW_DAYS = 3;

function ensureSubtasks(job){
  if(!job.subtasks) job.subtasks = [];
  // Migrate old chunks to subtasks if present
  if(job.chunks && job.chunks.length && !job.subtasks.length){
    job.subtasks = job.chunks.map((c,i)=>({
      id: c.id||`${job.id}_st${i}`,
      name: c.name||`Part ${i+1}`,
      mins: Math.round((job.mins||30)/job.chunks.length),
      done_date: c.done_date||null,
      seq: i,
    }));
    job.subtaskType = 'independent';
    delete job.chunks;
  }
}

function hasSubtasks(job){
  ensureSubtasks(job);
  return job.subtasks && job.subtasks.length > 0;
}

function subtaskProgress(job){
  if(!hasSubtasks(job)) return null;
  const done = job.subtasks.filter(s=>s.done_date).length;
  const total = job.subtasks.length;
  return {done, total, pct: Math.round(done/total*100)};
}

function nextPendingSubtask(job){
  if(!hasSubtasks(job)) return null;
  // Sequential — next undone in order
  return job.subtasks.slice().sort((a,b)=>a.seq-b.seq).find(s=>!s.done_date)||null;
}

function allSubtasksDone(job){
  return hasSubtasks(job) && job.subtasks.every(s=>s.done_date);
}

// "No baggage" reset — when frequency window expires, reset subtasks but keep names
function maybeResetSubtasks(job){
  if(!hasSubtasks(job)) return;
  const dd = dueDate(job);
  if(!dd) return;
  // If due date has passed (new cycle) and at least one subtask was done last cycle, reset
  if(dd <= today()){
    const anyDone = job.subtasks.some(s=>s.done_date);
    if(anyDone && !allSubtasksDone(job)){
      // Partial — wipe slate clean per "no baggage" principle
      job.subtasks.forEach(s=>s.done_date=null);
    } else if(allSubtasksDone(job)){
      // All done — this is the normal reset after markDone, handled there
    }
  }
}

function tickSubtask(jobId, subtaskId, mode){
  const job = state.jobs[jobId];
  ensureSubtasks(job);
  const st = job.subtasks.find(s=>s.id===subtaskId);
  if(!st) return;
  st.done_date = st.done_date ? null : today();
  // If independent and all done — mark parent done
  if(job.subtaskType==='independent' && allSubtasksDone(job)){
    markDone(jobId, mode); return;
  }
  // If dependent and all done — mark parent done
  if(job.subtaskType==='dependent' && allSubtasksDone(job)){
    markDone(jobId, mode); return;
  }
  // Track when dependent bundle was started
  if(job.subtaskType==='dependent' && !job.subtaskStarted){
    const anyDone = job.subtasks.some(s=>s.done_date);
    if(anyDone) job.subtaskStarted = today();
  }
  saveState();
  if(mode==='dispatch') renderDispatch();
  else if(mode==='roulette') document.getElementById('roulette-content').innerHTML=renderJobCard(job,'roulette');
  else if(mode==='room') renderRoomJobs(job.roomId||job.room);
}

// Check if dependent bundle is overdue (started > DEPENDENT_WINDOW_DAYS ago)
function isDependentOverdue(job){
  if(job.subtaskType!=='dependent') return false;
  if(!job.subtaskStarted) return false;
  if(allSubtasksDone(job)) return false;
  return daysBetween(job.subtaskStarted, today()) > DEPENDENT_WINDOW_DAYS;
}

// For independent subtasks, the ACTIVE subtask (next step) appears in dispatch
// Returns the job-like object to surface, or null if nothing to show
function getIndependentSubtaskJob(job){
  if(!hasSubtasks(job)||job.subtaskType!=='independent') return null;
  const next = nextPendingSubtask(job);
  if(!next) return null;
  const seq = job.subtasks.slice().sort((a,b)=>a.seq-b.seq).indexOf(next)+1;
  const total = job.subtasks.length;
  return {
    ...job,
    _isSubtaskProxy: true,
    _parentId: job.id,
    _subtaskId: next.id,
    title: next.name,
    _breadcrumb: `Step ${seq} of ${total} — ${job.title}`,
    mins: next.mins||job.mins,
  };
}

// ── DISPATCH ───────────────────────────────────────────────────────────────
function getDueJobs(){
  return Object.values(state.jobs)
    .filter(j=>isDue(j))
    .sort((a,b)=>{
      const ao=daysOverdue(a), bo=daysOverdue(b);
      if(bo!==ao) return bo-ao;
      return (b.reset_count||0)-(a.reset_count||0);
    });
}

function getAvailableJobs(){
  const activeRoomNames = getActiveRoomNames();
  return Object.values(state.jobs)
    .filter(j=>{
      if(j.status==='assigned'||j.status==='done') return false;
      if(j.tier==='stepchange') return false;
      if(j.wizSkipped) return false;
      if(isDue(j)) return false;
      // Respect active rooms
      if(j.roomId){ const rm=getRoomById(j.roomId); if(rm&&!rm.active) return false; }
      else if(j.room && activeRoomNames.length && !activeRoomNames.includes(j.room)) return false;
      const dd = dueDate(j);
      return !!dd;
    })
    .sort((a,b)=>{
      const da=daysBetween(today(),dueDate(a)||'9999');
      const db=daysBetween(today(),dueDate(b)||'9999');
      return da-db;
    });
}

let currentDispatchJob = null;
let showAllAvailable = false;

function renderDispatch(){
  const due = getDueJobs();
  const assigned = Object.values(state.jobs).filter(j=>j.status==='assigned');
  const total = Object.values(state.jobs).length;

  // Ensure subtasks for all jobs
  Object.values(state.jobs).forEach(j=>ensureSubtasks(j));

  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-card"><div class="stat-num">${due.length}</div><div class="stat-lbl">Due now</div></div>
    <div class="stat-card" onclick="cyclePeriod()" style="cursor:pointer;" title="Tap to change period">
      <div class="stat-num">${countDone()}</div>
      <div class="stat-lbl">${periodLabel()} ↻</div>
    </div>
    <div class="stat-card"><div class="stat-num">${assigned.length}</div><div class="stat-lbl">Assigned</div></div>
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Total jobs</div></div>
  `;

  const el = document.getElementById('dispatch-content');
  let html = '';

  if(due.length){
    if(!currentDispatchJob || !due.find(j=>j.id===currentDispatchJob)){
      currentDispatchJob = due[0].id;
    }
    const job = state.jobs[currentDispatchJob];
    maybeResetSubtasks(job);
    html += renderJobCard(job,'dispatch');
    if(due.length>1){
      html += `<div style="text-align:center;font-size:11px;color:var(--slate);padding:6px 0 0;">${due.length-1} more due</div>`;
    }
  } else {
    html += `<div class="empty-state"><div class="big">All clear</div><p>Nothing due right now.</p></div>`;
  }

  // Available jobs section
  const available = getAvailableJobs();
  if(available.length){
    const show = showAllAvailable ? available : available.slice(0,5);
    html += `<div class="available-section">
      <div class="section-label">Also available — not yet due</div>
      ${show.map(j=>{
        const dd=dueDate(j);
        const daysUntil=daysBetween(today(),dd);
        const dueStr=daysUntil===0?'Due today':daysUntil===1?'Due tomorrow':`Due in ${daysUntil}d`;
        const prog=subtaskProgress(j);
        const progStr=prog?` · ${prog.done}/${prog.total} steps`:'';
        return `<div class="available-job" onclick="pickAvailableJob('${j.id}')">
          <div class="available-job-info">
            <div class="available-job-title">${j.title}</div>
            <div class="available-job-meta">${j.room} · ${j.mins===999?'major':j.mins+'m'}${progStr}</div>
          </div>
          <div class="available-job-due">${dueStr}</div>
        </div>`;
      }).join('')}
      ${!showAllAvailable&&available.length>5?`<button onclick="showAllAvailable=true;renderDispatch();" style="width:100%;background:none;border:1px solid var(--warm2);border-radius:var(--r2);padding:9px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--slate);cursor:pointer;margin-top:4px;">Show all ${available.length} available jobs</button>`:''}
    </div>`;
  }

  el.innerHTML = html;

  // Show scheduling prompt if needed
  renderSchedulingPrompt();
}

function pickAvailableJob(id){
  currentDispatchJob = id;
  renderDispatch();
}

// ── JOB CARD ───────────────────────────────────────────────────────────────
function renderJobCard(job, mode){
  ensureSubtasks(job);
  const overdue = daysOverdue(job);
  const dueLabel = dueDateLabel(job);
  const dueClass = overdue>0?'overdue':overdue===0?'due-soon':'';
  const equipHtml = job.equip&&job.equip.length
    ? `<div class="card-equipment">${job.equip.map(e=>`<span class="equip-tag">${e}</span>`).join('')}</div>` : '';
  const resetHtml = job.reset_count>0
    ? `<div class="reset-flag">Skipped ${job.reset_count} time${job.reset_count>1?'s':''}</div>` : '';
  const notesHtml = job.notes
    ? `<div class="card-notes">${job.notes}</div>` : '';

  // Breadcrumb for subtask proxy cards
  const breadcrumbHtml = job._breadcrumb
    ? `<div class="subtask-breadcrumb">${job._breadcrumb}</div>` : '';

  // Subtask display
  const prog = subtaskProgress(job);
  let subtaskHtml = '';
  let actionsHtml = '';

  if(hasSubtasks(job) && job.subtaskType==='dependent'){
    const nudge = isDependentOverdue(job)
      ? `<div class="subtask-nudge">⚠ Started ${daysBetween(job.subtaskStarted,today())} days ago — try to finish this soon</div>` : '';
    const expanded = job._subtasksExpanded;
    subtaskHtml = `
      ${nudge}
      <div style="padding:8px 18px;">
        <div class="subtask-dependent-badge">🔗 Steps must be done together</div>
        <button onclick="toggleSubtasksExpanded('${job.id}','${mode}')"
          style="background:none;border:none;color:var(--rust);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;display:block;margin-bottom:${expanded?'8':'0'}px;">
          ${expanded?'▾ Hide steps':'▸ Show steps'} (${prog?prog.done+'/'+prog.total+' done':''+job.subtasks.length+' steps'})
        </button>
        ${expanded?`<div class="subtask-list">
          ${job.subtasks.slice().sort((a,b)=>a.seq-b.seq).map(st=>`
            <div class="subtask-item">
              <button class="subtask-check ${st.done_date?'done':''}" onclick="tickSubtask('${job.id}','${st.id}','${mode}')">✓</button>
              <div class="subtask-info">
                <div class="subtask-name ${st.done_date?'done':''}">${st.name}</div>
                <div class="subtask-meta">${st.mins}m</div>
                ${st.done_date?`<div class="subtask-date">Done ${formatSubtaskDate(st.done_date)}</div>`:''}
              </div>
            </div>`).join('')}
        </div>`:''}
      </div>`;
    actionsHtml = `
      <div class="card-actions">
        <button class="btn btn-done" onclick="markDone('${job.id}','${mode}')">✓ All done</button>
        <button class="btn btn-roulette" onclick="rouletteMe('${mode}')">Roulette me</button>
      </div>
      <div class="card-actions-row2">
        <button class="btn btn-later btn-small" onclick="notNow('${job.id}','${mode}')">Skip me</button>
        <button class="btn btn-assign btn-small" onclick="openAssignModal('${job.id}')">Assign</button>
        <button class="btn btn-later btn-small" onclick="showInfo('${job.id}')">⋯</button>
      </div>`;
  } else if(hasSubtasks(job) && job.subtaskType==='independent'){
    // Progress bar for independent
    subtaskHtml = prog ? `
      <div class="progress-wrap">
        <div class="progress-label">
          <span class="progress-label-text">Progress</span>
          <span class="progress-label-count">${prog.done} of ${prog.total} steps</span>
        </div>
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${prog.pct}%"></div></div>
      </div>` : '';
    const nextSt = nextPendingSubtask(job);
    actionsHtml = `
      <div class="card-actions">
        ${nextSt?`<button class="btn btn-doabit" onclick="tickSubtask('${job.id}','${nextSt.id}','${mode}')">▶ ${nextSt.name} (${nextSt.mins}m)</button>`
                :`<button class="btn btn-done" onclick="markDone('${job.id}','${mode}')">✓ All done</button>`}
        <button class="btn btn-roulette" onclick="rouletteMe('${mode}')">Roulette me</button>
      </div>
      <div class="card-actions-row2">
        <button class="btn btn-later btn-small" onclick="notNow('${job.id}','${mode}')">Skip me</button>
        <button class="btn btn-assign btn-small" onclick="openAssignModal('${job.id}')">Assign</button>
        <button class="btn btn-later btn-small" onclick="showInfo('${job.id}')">⋯</button>
      </div>`;
  } else {
    actionsHtml = `
      <div class="card-actions">
        <button class="btn btn-done" onclick="markDone('${job._isSubtaskProxy?job._parentId:job.id}','${mode}')">✓ Done</button>
        <button class="btn btn-roulette" onclick="rouletteMe('${mode}')">Roulette me</button>
      </div>
      <div class="card-actions-row2">
        <button class="btn btn-later btn-small" onclick="notNow('${job._isSubtaskProxy?job._parentId:job.id}','${mode}')">Skip me</button>
        <button class="btn btn-assign btn-small" onclick="openAssignModal('${job._isSubtaskProxy?job._parentId:job.id}')">Assign</button>
        <button class="btn btn-later btn-small" onclick="showInfo('${job._isSubtaskProxy?job._parentId:job.id}')">⋯</button>
      </div>`;
  }

  // Scheduled date
  const scheduledHtml = job.scheduled_date && job.scheduled_date >= today()
    ? `<div style="font-size:11px;color:var(--green3);padding:4px 18px 0;">📅 Scheduled for ${formatDate(job.scheduled_date)}</div>` : '';

  return `
    <div class="dispatch-card">
      <div class="card-header">
        <div style="flex:1">
          ${breadcrumbHtml}
          <div class="card-room">${job.room}</div>
          <div class="card-title">${job.title}</div>
        </div>
        <span class="tier-badge t-${job.tier}">${job.tier}</span>
      </div>
      <div class="card-meta">
        <div class="meta-item"><div class="meta-label">Time</div><div class="meta-value">${job.mins===999?'Half day+':job.mins+'m'}</div></div>

        <div class="meta-item"><div class="meta-label">Frequency</div><div class="meta-value">${job.freq}</div></div>
        <div class="meta-item"><div class="meta-label">Last done</div><div class="meta-value">${lastDoneLabel(job)}</div></div>
      </div>
      ${scheduledHtml}
      ${notesHtml}
      ${equipHtml}
      ${resetHtml}
      ${subtaskHtml}
      ${actionsHtml}
    </div>
  `;
}

function toggleSubtasksExpanded(jobId, mode){
  const job = state.jobs[jobId];
  if(job) job._subtasksExpanded = !job._subtasksExpanded;
  if(mode==='dispatch') renderDispatch();
  else if(mode==='roulette') document.getElementById('roulette-content').innerHTML=renderJobCard(job,'roulette');
  else if(mode==='room') renderRoomJobs(job.roomId||job.room);
}

function formatSubtaskDate(dateStr){
  if(!dateStr) return '';
  const days = daysBetween(dateStr,today());
  if(days===0) return 'today';
  if(days===1) return 'yesterday';
  return `${days} days ago`;
}

function formatDate(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}

// ── MARK DONE / NOT NOW / ROULETTE ME ──────────────────────────────────────
function markDone(id, mode){
  const job = state.jobs[id];
  if(!job) return;
  job.last_done = today();
  job.reset_count = 0;
  job.status = 'active';
  // Reset subtasks — keep names, clear dates (no baggage)
  if(hasSubtasks(job)){
    job.subtasks.forEach(s=>s.done_date=null);
    job.subtaskStarted = null;
    job._subtasksExpanded = false;
  }
  // Clear scheduled date
  job.scheduled_date = null;
  saveState();
  showToast('✓ Done');
  if(mode==='dispatch'){ currentDispatchJob=null; renderDispatch(); }
  if(mode==='roulette') spinRoulette();
  if(mode==='room') renderRoomJobs(job.roomId||job.room);
}

function notNow(id, mode){
  // Skip me — defers job to its next due date by setting last_done to today
  // This means the job disappears from dispatch until genuinely due again
  const job = state.jobs[id];
  if(!job) return;
  job.last_done = today();
  job.reset_count = (job.reset_count||0)+1;
  job.scheduled_date = null;
  saveState();
  pendingScheduleJobId = id;
  if(mode==='dispatch'){ currentDispatchJob=null; renderDispatch(); }
  if(mode==='roulette') spinRoulette();
  if(mode==='room') renderRoomJobs(job.roomId||job.room);
}

function rouletteMe(mode){
  // Roulette me — suppress current job from dispatch for 48 hours, show something else
  if(mode==='dispatch' && currentDispatchJob){
    const job = state.jobs[currentDispatchJob];
    if(job){
      job.suppressed_until = addDays(today(), 2);
      saveState();
    }
    currentDispatchJob = null;
    renderDispatch();
  } else {
    spinRoulette();
  }
}

function addDays(dateStr, n){
  const d = new Date(dateStr);
  d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0];
}

// ── RESET OVERDUE ──────────────────────────────────────────────────────────
function resetOverdue(){
  if(!confirm('This will reschedule all overdue jobs from today. Your done history is untouched. Continue?')) return;
  const now = today();
  Object.values(state.jobs).forEach(j=>{
    if(!isDue(j)) return;
    if(j.freq==='one-off'||j.freq==='as needed') return;
    // Mark as done today so next due = today + frequency
    j.last_done = now;
    j.reset_count = 0;
  });
  saveState();
  showToast('Overdue jobs rescheduled from today');
  renderDispatch();
}

// ── STATS PERIOD TOGGLE ────────────────────────────────────────────────────
let statPeriod = 'today'; // 'today' | 'week' | 'month'

function cyclePeriod(){
  statPeriod = statPeriod==='today' ? 'week' : statPeriod==='week' ? 'month' : 'today';
  renderDispatch();
}

function countDone(){
  const now = today();
  if(statPeriod==='today'){
    return Object.values(state.jobs).filter(j=>j.last_done===now).length;
  }
  if(statPeriod==='week'){
    // Monday of current week
    const d = new Date();
    const day = d.getDay(); // 0=Sun
    const diff = (day===0?-6:1-day);
    d.setDate(d.getDate()+diff);
    const weekStart = d.toISOString().split('T')[0];
    return Object.values(state.jobs).filter(j=>j.last_done&&j.last_done>=weekStart&&j.last_done<=now).length;
  }
  if(statPeriod==='month'){
    const monthStart = now.substring(0,7)+'-01';
    return Object.values(state.jobs).filter(j=>j.last_done&&j.last_done>=monthStart&&j.last_done<=now).length;
  }
  return 0;
}

function periodLabel(){
  if(statPeriod==='today') return 'Done today';
  if(statPeriod==='week') return 'Done this week';
  return 'Done this month';
}

// ── SCHEDULING ─────────────────────────────────────────────────────────────
let pendingScheduleJobId = null;

function renderSchedulingPrompt(){
  const el = document.getElementById('dispatch-content');
  if(!el||!pendingScheduleJobId) return;
  const job = state.jobs[pendingScheduleJobId];
  if(!job) return;
  const promptEl = document.createElement('div');
  promptEl.id = 'schedule-prompt';
  promptEl.style.cssText = 'margin-top:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;display:flex;align-items:center;gap:10px;';
  promptEl.innerHTML = `
    <div style="flex:1;font-size:13px;color:var(--slate);">Set a date for <strong style="color:var(--ink);">${job.title}</strong>?</div>
    <input type="date" id="schedule-date-input" min="${today()}"
      style="border:1.5px solid var(--warm2);border-radius:6px;padding:6px 8px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);background:var(--cream);outline:none;">
    <button onclick="confirmSchedule()" style="background:var(--green);color:white;border:none;border-radius:6px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;">Set</button>
    <button onclick="dismissSchedulePrompt()" style="background:none;border:none;color:var(--slate2);font-size:18px;cursor:pointer;line-height:1;">×</button>
  `;
  el.appendChild(promptEl);
}

function confirmSchedule(){
  const inp = document.getElementById('schedule-date-input');
  if(!inp||!inp.value||!pendingScheduleJobId) return;
  state.jobs[pendingScheduleJobId].scheduled_date = inp.value;
  saveState();
  showToast(`Scheduled for ${formatDate(inp.value)}`);
  pendingScheduleJobId = null;
  renderDispatch();
}

function dismissSchedulePrompt(){
  pendingScheduleJobId = null;
  const el = document.getElementById('schedule-prompt');
  if(el) el.remove();
}

function showInfo(id){
  const j = state.jobs[id];
  showToast(`${j.freq} · ${j.mins===999?'Major project':j.mins+'m'}`);
}

// ── ROULETTE ───────────────────────────────────────────────────────────────
let rouletteMaxMins = 30;
let rouletteRoomMode = 'any';
let rouletteRoom = '';

function setTime(mins, btn){
  rouletteMaxMins = mins;
  document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function setRouletteMode(mode, btn){
  rouletteRoomMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('roulette-room-select').style.display = mode==='room'?'block':'none';
}

function renderRoulette(){
  const el = document.getElementById('roulette-content');
  // Populate room picker
  const picker = document.getElementById('roulette-room-picker');
  const rooms = [...new Set(JOB_TEMPLATES.filter(j=>j.tier!=='stepchange').map(j=>j.room))].sort();
  picker.innerHTML = rooms.map(r=>`<option value="${r}">${r}</option>`).join('');
  el.innerHTML = `<div style="text-align:center;padding:30px 0;color:var(--slate2);font-size:13px;font-weight:300;">Press spin to get a job</div>`;
}

function spinRoulette(){
  const maxMins = rouletteMaxMins;
  const activeRoomNames = getActiveRoomNames();

  // Build pool — due jobs + independent subtask proxies
  let pool = [];
  Object.values(state.jobs).forEach(j=>{
    if(!isDue(j)) return;
    ensureSubtasks(j);
    if(hasSubtasks(j) && j.subtaskType==='independent'){
      const proxy = getIndependentSubtaskJob(j);
      if(proxy) pool.push(proxy);
    } else {
      pool.push(j);
    }
  });

  // Time bracket filtering
  if(maxMins===30) pool = pool.filter(j=>j.mins<=30);
  else if(maxMins===60) pool = pool.filter(j=>j.mins>30&&j.mins<=60);
  else if(maxMins===180) pool = pool.filter(j=>j.mins>60&&j.mins<=180);
  else if(maxMins===999) pool = pool.filter(j=>j.mins>180||j.mins===999);

  if(rouletteRoomMode==='room'){
    const room = document.getElementById('roulette-room-picker').value;
    pool = pool.filter(j=>j.room===room);
  }

  const el = document.getElementById('roulette-content');
  if(!pool.length){
    el.innerHTML=`<div style="text-align:center;padding:30px 0;color:var(--slate2);font-size:13px;">Nothing due in that time bracket — try a longer window.</div>`;
    return;
  }
  let i=0;
  const tick = setInterval(()=>{
    const r = pool[Math.floor(Math.random()*pool.length)];
    el.innerHTML=`<div class="dispatch-card" style="opacity:0.4"><div class="card-header"><div style="flex:1"><div class="card-room">${r.room}</div><div class="card-title">${r.title}</div></div></div></div>`;
    i++;
    if(i>12){
      clearInterval(tick);
      const chosen = pool[Math.floor(Math.random()*pool.length)];
      const job = chosen._isSubtaskProxy ? chosen : state.jobs[chosen.id];
      ensureSubtasks(job);
      el.innerHTML = renderJobCard(chosen,'roulette');
    }
  },80);
}

// ── ROOMS ──────────────────────────────────────────────────────────────────
let selectedRoom = null;

function renderRooms(){

  if(!rooms.length){

  }

    const dueCount = Object.values(state.jobs).filter(j=>(j.roomId===rm.id||j.room===rm.name)&&isDue(j)).length;
    return `<div class="room-card ${selectedRoom===rm.id?'selected':''}" onclick="selectRoom('${rm.id}')">

function selectRoom(roomId){
  selectedRoom = roomId;
  renderRooms();
  setTimeout(()=>{
    const el = document.getElementById('room-jobs-content');
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  }, 80);
}

function renderRoomJobs(roomId){
  const el = document.getElementById('room-jobs-content');
  if(!el) return;
  const rm = getRoomById(roomId);
  if(!rm){ el.innerHTML=''; return; }
  const jobs = Object.values(state.jobs)
    .filter(j=>(j.roomId===rm.id||j.room===rm.name)&&j.tier!=='stepchange'&&!j.wizSkipped)
    .sort((a,b)=>{
      const ad=isDue(a)?-1:0, bd=isDue(b)?-1:0;
      if(ad!==bd) return ad-bd;
      return a.title.localeCompare(b.title);
    });
  if(!jobs.length){
    el.innerHTML=`<div style="padding:20px;text-align:center;color:var(--slate2);font-size:13px;font-weight:300;">No jobs in this room yet.</div>`;
    return;
  }
  el.innerHTML = `<div class="section-label" style="padding:12px 0 8px;">${rm.name}</div>`+
    jobs.map(j=>renderJobCard(j,'room')).join('');

// ── ASSIGNED ───────────────────────────────────────────────────────────────
function renderAssigned(){
  const assignees = getAssignees();
  const el = document.getElementById('assigned-all-content');
  if(!el) return;
  let html = '';
  assignees.forEach(person=>{
    const jobs = Object.values(state.jobs).filter(j=>j.assigned_to===person&&j.status==='assigned');
    html += `<div class="section-label">${person}</div>`;
    if(!jobs.length){
      html += `<div style="color:var(--slate2);font-size:13px;font-weight:300;padding:8px 0 12px;">Nothing assigned.</div>`;
    } else {
      html += jobs.map(j=>{
        const days = j.assigned_date ? daysBetween(j.assigned_date,today()) : 0;
        const ageLabel = days===0?'Assigned today':days===1?'Assigned yesterday':`Assigned ${days} days ago`;
        const flag = days>7?' — overdue':'';
        return `<div class="assigned-card">
          <span class="assigned-person p-nick">${person}</span>
          <div class="assigned-info">
            <div class="assigned-title">${j.title}</div>
            <div class="assigned-room">${j.room}</div>
            <div class="assigned-age">${ageLabel}${flag}</div>
            <div class="assigned-actions">
              <button class="btn-tiny btn-markedone" onclick="markAssignedDone('${j.id}')">✓ Done</button>
              <button class="btn-tiny btn-takeback" onclick="takeBack('${j.id}')">Take back</button>
              <button class="btn-tiny btn-nudge" onclick="copyNudge('${j.id}')">Copy nudge</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }
  });
  el.innerHTML = html;
}

function markAssignedDone(id){
  state.jobs[id].last_done = today();
  state.jobs[id].reset_count = 0;
  state.jobs[id].status = 'active';
  state.jobs[id].assigned_to = 'me';
  saveState();
  showToast('✓ Marked done');
  renderAssigned();
}

function takeBack(id){
  state.jobs[id].status = 'active';
  state.jobs[id].assigned_to = 'me';
  state.jobs[id].assigned_date = null;
  saveState();
  renderAssigned();
}

function copyNudge(id){
  const j = state.jobs[id];
  const msg = `Hey — could you do this when you get a chance: "${j.title}" (${j.room}, about ${j.mins}m). Thanks!`;
  navigator.clipboard.writeText(msg).then(()=>showToast('Nudge copied'));
}

let editorSelectedId = null;

function renderSettings(){
  // Populate room filter dropdown
  const roomSel = document.getElementById('editor-filter-room');
  if(roomSel){
    const rooms = [...new Set(Object.values(state.jobs).map(j=>j.room))].sort();

      rooms.map(r=>`<option value="${r}">${r}</option>`).join('');
  }
  filterEditorJobs();
  renderAssigneeList();
  const keyDisplay = document.getElementById('account-key-display');
  if(keyDisplay) keyDisplay.textContent = userKey || '—';

function filterEditorJobs(){
  const q = (document.getElementById('editor-search')||{}).value||'';
  const roomF = (document.getElementById('editor-filter-room')||{}).value||'';
  const tierF = (document.getElementById('editor-filter-tier')||{}).value||'';
  const sortF = (document.getElementById('editor-filter-sort')||{}).value||'room';

  let jobs = Object.values(state.jobs).filter(j=>{
    if(q && !j.title.toLowerCase().includes(q.toLowerCase()) && !j.room.toLowerCase().includes(q.toLowerCase())) return false;
    if(roomF && j.room !== roomF) return false;
    if(tierF && j.tier !== tierF) return false;
    return true;
  });

  if(sortF==='room') jobs.sort((a,b)=>a.room.localeCompare(b.room)||a.title.localeCompare(b.title));
  else if(sortF==='title') jobs.sort((a,b)=>a.title.localeCompare(b.title));
  else if(sortF==='due') jobs.sort((a,b)=>{
    const da = dueDate(a)||'9999'; const db = dueDate(b)||'9999';
    return da.localeCompare(db);
  });

  jobs = jobs.slice(0,40);
  const el = document.getElementById('editor-job-list');
  if(!el) return;
  if(!jobs.length){el.innerHTML='<div style="font-size:13px;color:var(--slate);padding:8px 0;">No jobs found.</div>';return;}
  el.innerHTML = jobs.map(j=>`
    <div class="editor-job-item ${editorSelectedId===j.id?'selected':''}" data-id="${j.id}" onclick="selectEditorJob(this.dataset.id)">
      <div>
        <div class="editor-job-name">${j.title}${j.wizSkipped?'<span style="font-size:10px;color:var(--slate2);margin-left:6px;">(hidden)</span>':''}</div>
        <div class="editor-job-room">${j.room} · ${j.tier} · ${j.freq}</div>
      </div>
      <span class="tier-badge t-${j.tier}" style="flex-shrink:0;">${j.tier}</span>
    </div>
  `).join('');
}

}

    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--warm2);">

function updateAssignee(i, val){
  if(!val.trim()) return;
  getAssignees()[i] = val.trim();
  saveState();
}

function addAssignee(){
  const inp = document.getElementById('new-assignee-input');
  if(!inp||!inp.value.trim()) return;
  getAssignees().push(inp.value.trim());
  inp.value='';
  saveState();
  renderAssigneeList();
}

function removeAssignee(i){
  const assignees = getAssignees();
  if(assignees.length<=1){ showToast('Keep at least one assignee'); return; }
  const removedName = assignees[i];
  assignees.splice(i,1);
  // Revert any jobs assigned to this person back to 'me'
  let reverted = 0;
  Object.values(state.jobs).forEach(j=>{
    if(j.assigned_to===removedName && j.status==='assigned'){
      j.assigned_to='me';
      j.status='active';
      j.assigned_date=null;
      reverted++;
    }
  });
  saveState();
  renderAssigneeList();
  if(reverted) showToast(`${removedName} removed — ${reverted} job${reverted!==1?'s':''} returned to you`);
  else showToast(`${removedName} removed`);
}

          <button class="subtask-type-btn ${subtaskType==='dependent'?'active':''}" onclick="setSubtaskType('${id}','dependent')">🔗 Dependent<br><span style="font-size:10px;font-weight:300;">All steps shown together</span></button>

      ${j.subtasks.length > 0 ? `<button class="editor-reset-job" style="margin-top:8px;" onclick="saveSubtaskEdits('${id}')">Save steps</button>` : ''}

        <option value="${j.room}" ${!getRooms(false).find(r=>r.name===j.room)?'selected':''}>${j.room}</option>
      </select>

      </select>

      <select id="ef-freq">
        ${freqs.map(f=>`<option value="${f}" ${j.freq===f?'selected':''}>${f}</option>`).join('')}
      </select>
      <label>Duration (minutes)</label>
      <input id="ef-mins" type="number" min="1" value="${j.mins===999?480:j.mins}">
      <label>Notes</label>
      <textarea id="ef-notes">${j.notes||''}</textarea>
      <button class="editor-save" onclick="saveEditorJob('${id}')">Save changes</button>
      <button class="editor-reset-job" onclick="resetJobHistory('${id}')">Reset done history</button>

function setSubtaskType(jobId, type){
  saveSubtaskEdits(jobId);
  state.jobs[jobId].subtaskType = type;
  saveState();
  selectEditorJob(jobId);
}

function saveSubtaskEdits(jobId){
  const j = state.jobs[jobId];
  j.subtasks.forEach(st=>{
    const nameEl = document.getElementById(`stn-${st.id}`);
    const minsEl = document.getElementById(`stm-${st.id}`);
    if(nameEl) st.name = nameEl.value.trim()||st.name;
    if(minsEl) st.mins = parseInt(minsEl.value)||st.mins;
  });
  saveState();
  showToast('Steps saved');
  selectEditorJob(jobId);
}

function addSubtask(jobId){
  saveSubtaskEdits(jobId);
  const j = state.jobs[jobId];
  const n = j.subtasks.length;
  j.subtasks.push({
    id: `${jobId}_st${Date.now()}`,
    name: `Step ${n+1}`,
    mins: 20,
    done_date: null,
    seq: n,
  });
  if(!j.subtaskType) j.subtaskType = 'independent';
  saveState();
  selectEditorJob(jobId);
}

function deleteSubtask(jobId, stId){
  saveSubtaskEdits(jobId);
  const j = state.jobs[jobId];
  j.subtasks = j.subtasks.filter(s=>s.id!==stId);
  // Re-sequence
  j.subtasks.forEach((s,i)=>s.seq=i);
  if(!j.subtasks.length) j.subtaskType = null;
  saveState();
  selectEditorJob(jobId);
}

function saveEditorJob(id){
  const j = state.jobs[id];
  j.title = (document.getElementById('ef-title').value||'').trim()||j.title;
  const roomSel = document.getElementById('ef-room');
  if(roomSel) j.room = roomSel.value||j.room;
  j.tier = document.getElementById('ef-tier').value;
  j.freq = document.getElementById('ef-freq').value;
  j.mins = parseInt(document.getElementById('ef-mins').value)||j.mins;
  j.notes = (document.getElementById('ef-notes').value||'').trim();
  saveState();
  showToast('Job updated');
  filterEditorJobs();
}

function resetJobHistory(id){
  state.jobs[id].last_done = null;
  state.jobs[id].reset_count = 0;
  if(state.jobs[id].subtasks) state.jobs[id].subtasks.forEach(s=>s.done_date=null);
  saveState();
  showToast('History reset');
}

function reScatter(){
  if(!confirm('This will reschedule jobs that are overdue or have never been done. Recently done jobs are untouched. Continue?')) return;
  const SCATTER_FREQS = {'daily':1,'2-3x week':3,'weekly':7,'fortnightly':14,'monthly':30,'quarterly':91,'annually':365,'seasonal':90};
  const SKIP_TIERS = new Set(['large','major','stepchange']);
  const SKIP_FREQS = new Set(['one-off','as needed']);
  let count = 0;
  Object.values(state.jobs).forEach(j=>{
    if(SKIP_TIERS.has(j.tier)) return;
    if(SKIP_FREQS.has(j.freq)) return;
    if(j.status==='assigned') return;
    // Only touch jobs that are currently overdue or never done
    if(j.last_done && !isDue(j)) return; // recently done — leave alone
    const window = SCATTER_FREQS[j.freq];
    if(!window) return;
    const daysAgo = Math.floor(Math.random()*window);
    const d = new Date();
    d.setDate(d.getDate()-daysAgo);
    j.last_done = d.toISOString().split('T')[0];
    count++;
  });
  state.scattered = true;
  saveState();
  showToast(`${count} job${count!==1?'s':''} rescheduled`);
  renderDispatch();
}

function switchAccount(){
  if(!confirm('This will sign you out. Your data is safe in the cloud — just enter your key again to get it back. Continue?')) return;
  localStorage.removeItem('hearth_user_key');
  location.reload();
}

function setSyncDot(status){

  if(!dot) return;
  if(status==='synced') dot.style.background='rgba(74,124,95,0.8)';
  else if(status==='syncing') dot.style.background='rgba(196,154,60,0.8)';
  else dot.style.background='rgba(255,255,255,0.2)';
}
