<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hearth</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1C1812;--ink2:#2A2318;--ink3:#3D3428;
  --cream:#F7F3ED;--warm:#EDE6D9;--warm2:#E2D9C8;
  --rust:#B85C3A;--rust2:#D4785A;--rust3:#8A3F24;
  --gold:#C49A3C;--gold2:#C49A3C;
  --green:#4A7C5F;--green2:#6B9E7E;--green3:#2E5C42;
  --slate:#7A6A55;--slate2:#9A8A75;
  --card:#FFFFFF;
  --bg:var(--cream);
  --surface:var(--warm);
  --border:rgba(28,24,18,0.10);
  --text:var(--ink);--text2:var(--slate);
  --shadow:rgba(28,24,18,0.10);
  --r:12px;--r2:8px;
}
html{height:100%;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  max-width:480px;
  margin:0 auto;
  position:relative;
}

/* NAV */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;
  position:sticky;top:0;z-index:100;
  background:var(--ink);
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.nav-logo{
  font-family:'DM Serif Display',serif;
  font-size:22px;color:var(--cream);letter-spacing:0.01em;
}
.nav-logo em{color:var(--rust2);font-style:italic;}
.nav-date{font-size:11px;color:rgba(255,255,255,0.45);font-weight:300;letter-spacing:0.05em;}

/* TAB BAR */
.tabbar{
  display:flex;
  background:var(--ink2);
  border-bottom:1px solid rgba(255,255,255,0.06);
  position:sticky;top:57px;z-index:99;
}
.tab-btn{
  flex:1;padding:11px 4px;
  font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:rgba(255,255,255,0.4);background:none;border:none;
  cursor:pointer;transition:color 0.2s;
  border-bottom:2px solid transparent;
}
.tab-btn.active{color:var(--cream);border-bottom-color:var(--rust2);}
.tab-btn:hover:not(.active){color:var(--cream);}

/* PANELS */
.panel{display:none;padding:20px 16px 100px;background:var(--cream);}
.panel.active{display:block;}

/* SECTION LABEL */
.section-label{
  font-size:10px;font-weight:500;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--slate);
  margin:20px 0 10px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--warm2);}

/* DISPATCH CARD */
.dispatch-card{
  background:var(--card);border-radius:var(--r);
  border:1px solid var(--border);
  box-shadow:0 2px 8px var(--shadow);
  overflow:hidden;margin-bottom:12px;
  animation:cardIn 0.3s ease;
}
@keyframes cardIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.card-header{
  padding:16px 18px 12px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:10px;
}
.card-room{
  font-size:10px;font-weight:500;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--slate);
  margin-bottom:5px;
}
.card-title{
  font-family:'DM Serif Display',serif;
  font-size:22px;color:var(--ink);line-height:1.15;
  flex:1;
}
.tier-badge{
  font-size:10px;font-weight:500;padding:3px 9px;
  border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:3px;
}
.t-micro{background:rgba(74,124,95,0.15);color:#2E5C42;}
.t-small{background:rgba(196,154,60,0.15);color:#8A6820;}
.t-large{background:rgba(184,92,58,0.15);color:#8A3F24;}
.t-major{background:rgba(160,64,64,0.15);color:#7A2020;}
.t-stepchange{background:rgba(130,100,200,0.15);color:#4A3A8A;}

.card-meta{
  padding:12px 18px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  border-bottom:1px solid var(--border);
  background:var(--warm);
}
.meta-item{display:flex;flex-direction:column;gap:2px;}
.meta-label{font-size:10px;color:var(--slate);font-weight:500;letter-spacing:0.06em;text-transform:uppercase;}
.meta-value{font-size:13px;color:var(--ink);font-weight:400;}
.meta-value.overdue{color:#B03030;}
.meta-value.due-soon{color:#8A6820;}

.card-notes{
  padding:12px 18px;
  font-size:13px;color:var(--slate);
  font-weight:300;line-height:1.55;
  border-bottom:1px solid var(--border);
}
.card-equipment{
  padding:10px 18px;
  display:flex;gap:6px;flex-wrap:wrap;
  border-bottom:1px solid var(--border);
}
.equip-tag{
  font-size:11px;color:#8A6820;
  background:rgba(196,154,60,0.12);
  border-radius:20px;padding:3px 9px;
}

.reset-flag{
  padding:8px 18px;
  font-size:11px;color:#B03030;
  background:rgba(160,64,64,0.08);
  display:flex;align-items:center;gap:6px;
}
.reset-flag::before{content:'↺';font-size:13px;}

.card-actions{
  padding:14px 18px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
}
.card-actions-row2{
  padding:0 18px 14px;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
}
.btn{
  border:none;border-radius:var(--r2);
  padding:11px 10px;
  font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;
  cursor:pointer;transition:all 0.15s;
  text-align:center;
}
.btn:active{transform:scale(0.97);}
.btn-done{background:var(--green);color:white;}
.btn-done:hover{background:var(--green2);}
.btn-roulette{background:var(--rust);color:white;}
.btn-roulette:hover{background:var(--rust2);}
.btn-later{background:var(--warm2);color:var(--ink);}
.btn-later:hover{background:var(--warm);}
.btn-assign{background:rgba(196,154,60,0.15);color:#8A6820;}
.btn-assign:hover{background:rgba(196,154,60,0.25);}
.btn-small{font-size:11px;padding:9px 8px;}

/* EMPTY STATE */
.empty-state{
  text-align:center;padding:60px 20px;
  color:var(--slate);
}
.empty-state .big{
  font-family:'DM Serif Display',serif;
  font-size:32px;color:var(--green);
  margin-bottom:10px;
}
.empty-state p{font-size:13px;font-weight:300;line-height:1.6;}

/* STATS BAR */
.stats-bar{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
  margin-bottom:16px;
}
.stat-card{
  background:var(--card);border-radius:var(--r2);
  padding:10px 8px;text-align:center;
  border:1px solid var(--border);
  box-shadow:0 1px 4px var(--shadow);
}
.stat-num{font-size:20px;font-weight:500;color:var(--ink);}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:var(--slate);margin-top:2px;}

/* MODE SWITCHER */
.mode-bar{
  display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;
}
.mode-btn{
  flex:1;min-width:80px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r2);padding:9px 6px;
  font-family:'DM Sans',sans-serif;font-size:11px;
  font-weight:500;letter-spacing:0.05em;
  color:var(--slate);cursor:pointer;
  transition:all 0.15s;text-align:center;
}
.mode-btn.active{background:var(--rust);border-color:var(--rust);color:white;}
.mode-btn:hover:not(.active){background:var(--warm);color:var(--ink);}

/* TIME FILTER */
.time-filter{display:flex;gap:6px;margin-bottom:16px;}
.time-btn{
  flex:1;background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r2);padding:8px 4px;
  font-family:'DM Sans',sans-serif;font-size:11px;
  font-weight:500;color:var(--slate);cursor:pointer;
  transition:all 0.15s;text-align:center;
}
.time-btn.active{background:var(--gold);border-color:var(--gold);color:white;}
.time-btn:hover:not(.active){background:var(--warm);color:var(--ink);}

/* ROOM GRID */
.room-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.room-card{
  background:var(--card);border-radius:var(--r2);
  padding:14px 12px;
  border:1px solid var(--border);
  box-shadow:0 1px 4px var(--shadow);
  cursor:pointer;transition:all 0.15s;
}
.room-card:hover{border-color:var(--rust2);background:var(--warm);}
.room-card.selected{border-color:var(--rust);background:var(--warm);}
.room-name{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:4px;}
.room-count{font-size:11px;color:var(--slate);}
.room-due{font-size:11px;color:var(--rust);}

/* ASSIGNED */
.assigned-card{
  background:var(--card);border-radius:var(--r2);
  padding:14px 16px;margin-bottom:8px;
  border:1px solid var(--border);
  box-shadow:0 1px 4px var(--shadow);
  display:flex;align-items:flex-start;gap:10px;
}
.assigned-person{
  font-size:10px;font-weight:500;letter-spacing:0.08em;
  text-transform:uppercase;padding:3px 8px;
  border-radius:12px;white-space:nowrap;
  flex-shrink:0;margin-top:2px;
}
.p-nick{background:rgba(196,154,60,0.15);color:#8A6820;}
.p-boys{background:rgba(130,100,200,0.15);color:#4A3A8A;}
.assigned-info{flex:1;}
.assigned-title{font-size:14px;color:var(--ink);font-weight:400;margin-bottom:3px;}
.assigned-room{font-size:11px;color:var(--slate);}
.assigned-age{font-size:11px;color:var(--rust);margin-top:3px;}
.assigned-actions{display:flex;gap:6px;margin-top:10px;}
.btn-tiny{
  font-size:11px;padding:5px 10px;border-radius:20px;
  border:none;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-weight:500;transition:all 0.15s;
}
.btn-takeback{background:var(--warm2);color:var(--ink);}
.btn-markedone{background:rgba(74,124,95,0.15);color:#2E5C42;}
.btn-nudge{background:rgba(196,154,60,0.15);color:#8A6820;}

/* STEP CHANGE */
.stepchange-card{
  background:linear-gradient(135deg,rgba(130,100,200,0.08),rgba(100,70,170,0.04));
  border:1px solid rgba(130,100,200,0.2);
  border-radius:var(--r);padding:20px 18px;margin-bottom:12px;
}
.sc-eyebrow{
  font-size:10px;font-weight:500;letter-spacing:0.1em;
  text-transform:uppercase;color:#4A3A8A;margin-bottom:8px;
}
.sc-title{
  font-family:'DM Serif Display',serif;
  font-size:20px;color:var(--ink);line-height:1.2;margin-bottom:8px;
}
.sc-note{font-size:13px;color:var(--slate);font-weight:300;line-height:1.55;margin-bottom:14px;}
.sc-actions{display:flex;gap:8px;}
.btn-sc-done{background:rgba(130,100,200,0.15);color:#4A3A8A;border-radius:var(--r2);padding:9px 16px;font-size:12px;font-weight:500;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-sc-snooze{background:var(--warm2);color:var(--slate);border-radius:var(--r2);padding:9px 16px;font-size:12px;font-weight:500;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ASSIGN MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:200;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity 0.2s;
}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{
  background:var(--cream);border-radius:var(--r) var(--r) 0 0;
  padding:20px 20px 40px;width:100%;
  transform:translateY(100%);transition:transform 0.3s ease;
  border-top:1px solid var(--border);
  box-shadow:0 -4px 20px rgba(28,24,18,0.15);
}
.modal-overlay.show .modal{transform:translateY(0);}
.modal-title{
  font-family:'DM Serif Display',serif;
  font-size:20px;color:var(--ink);margin-bottom:6px;
}
.modal-job{font-size:13px;color:var(--slate);margin-bottom:18px;font-weight:300;}
.assign-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.assign-opt{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:14px;text-align:center;
  cursor:pointer;transition:all 0.15s;
  box-shadow:0 1px 4px var(--shadow);
}
.assign-opt:hover{background:var(--warm);border-color:var(--rust2);}
.assign-opt-name{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:3px;}
.assign-opt-note{font-size:11px;color:var(--slate);}
.modal-cancel{
  width:100%;padding:12px;background:none;border:1px solid var(--border);
  border-radius:var(--r2);color:var(--slate);font-family:'DM Sans',sans-serif;
  font-size:13px;cursor:pointer;
}

/* PROGRESS BAR */
.progress-wrap{
  padding:10px 18px 0;
}
.progress-label{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:5px;
}
.progress-label-text{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--slate);}
.progress-label-count{font-size:11px;color:var(--ink);font-weight:500;}
.progress-bar-track{
  height:5px;background:var(--warm2);border-radius:3px;overflow:hidden;
}
.progress-bar-fill{
  height:100%;background:var(--green);border-radius:3px;
  transition:width 0.3s ease;
}

/* CHUNK LIST */
.chunk-list{
  padding:8px 18px 12px;border-bottom:1px solid var(--border);
}
.chunk-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 0;border-bottom:1px solid var(--warm2);
}
.chunk-item:last-child{border-bottom:none;}
.chunk-check{
  width:20px;height:20px;border-radius:50%;
  border:1.5px solid var(--warm2);background:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all 0.15s;font-size:11px;
  color:transparent;
}
.chunk-check.done{background:var(--green);border-color:var(--green);color:white;}
.chunk-check:hover:not(.done){border-color:var(--green);color:var(--green2);}
.chunk-info{flex:1;}
.chunk-name{font-size:13px;color:var(--ink);font-weight:400;}
.chunk-name.done{color:var(--slate2);text-decoration:line-through;}
.chunk-date{font-size:10px;color:var(--slate2);margin-top:1px;}

/* DO A BIT BUTTON */
.btn-doabit{background:linear-gradient(135deg,var(--rust),var(--rust3));color:white;}
.btn-doabit:hover{opacity:0.9;}

/* AVAILABLE JOBS SECTION */
.available-section{margin-top:20px;}
.available-job{
  background:var(--card);border-radius:var(--r2);
  padding:12px 14px;margin-bottom:8px;
  border:1px solid var(--border);
  box-shadow:0 1px 4px var(--shadow);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  cursor:pointer;transition:all 0.15s;
}
.available-job:hover{border-color:var(--rust2);background:var(--warm);}
.available-job-info{flex:1;}
.available-job-title{font-size:13px;color:var(--ink);font-weight:400;margin-bottom:2px;}
.available-job-meta{font-size:11px;color:var(--slate);}
.available-job-due{font-size:11px;color:var(--slate2);white-space:nowrap;flex-shrink:0;}

/* CHUNK EDITOR (in Settings) */
.chunk-editor-section{margin-top:14px;border-top:1px solid var(--warm2);padding-top:14px;}
.chunk-editor-title{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--slate);margin-bottom:10px;}
.chunk-editor-item{
  display:flex;align-items:center;gap:8px;
  margin-bottom:8px;
}
.chunk-editor-item input{
  flex:1;border:1.5px solid var(--warm2);border-radius:var(--r2);
  padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:13px;
  background:var(--cream);color:var(--ink);outline:none;
}
.chunk-editor-item input:focus{border-color:var(--rust2);}
.chunk-del{
  background:none;border:1px solid var(--warm2);border-radius:6px;
  color:var(--slate);font-size:13px;padding:6px 9px;
  cursor:pointer;transition:all 0.15s;flex-shrink:0;
}
.chunk-del:hover{border-color:var(--rust);color:var(--rust);}
.chunk-add-btn{
  width:100%;background:rgba(74,124,95,0.1);color:var(--green3);
  border:1px dashed rgba(74,124,95,0.3);border-radius:var(--r2);
  padding:9px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:all 0.15s;margin-top:4px;
}
.chunk-add-btn:hover{background:rgba(74,124,95,0.18);}

/* ── WIZARD ────────────────────────────────────────────────────────────── */
.wiz-screen{max-width:480px;margin:0 auto;padding:0 0 100px;}
.wiz-header{
  background:var(--ink);padding:20px 20px 16px;
  position:sticky;top:0;z-index:10;
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:space-between;
}
.wiz-logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--cream);}
.wiz-logo em{color:var(--rust2);font-style:italic;}
.wiz-skip{font-size:11px;color:rgba(255,255,255,0.4);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:6px 0;}
.wiz-skip:hover{color:rgba(255,255,255,0.7);}
.wiz-progress{height:3px;background:var(--warm2);}
.wiz-progress-fill{height:100%;background:var(--rust);transition:width 0.4s ease;}
.wiz-body{padding:28px 20px 20px;}
.wiz-eyebrow{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--slate);margin-bottom:12px;}
.wiz-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--ink);line-height:1.2;margin-bottom:8px;}
.wiz-title em{color:var(--rust2);font-style:italic;}
.wiz-sub{font-size:13px;color:var(--slate);font-weight:300;line-height:1.6;margin-bottom:24px;}

/* Mission questions */
.wiz-question{margin-bottom:20px;}
.wiz-question label{display:block;font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--slate);margin-bottom:6px;}
.wiz-question textarea{
  width:100%;border:1.5px solid var(--warm2);border-radius:var(--r2);
  padding:12px 14px;font-family:'DM Serif Display',serif;font-size:16px;
  color:var(--ink);background:var(--card);outline:none;resize:none;
  min-height:72px;line-height:1.4;
}
.wiz-question textarea:focus{border-color:var(--rust2);background:#fff;}
.wiz-question textarea::placeholder{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--slate2);}

/* Why statement preview */
.wiz-why-preview{
  background:var(--ink);border-radius:var(--r);padding:18px 20px;
  margin-bottom:20px;border-left:3px solid var(--rust2);
}
.wiz-why-label{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.wiz-why-text{font-family:'DM Serif Display',serif;font-size:16px;color:var(--cream);line-height:1.4;font-style:italic;}

/* Room selection */
.wiz-room-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.wiz-room-tile{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--r2);
  padding:12px 10px;cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;gap:8px;position:relative;
}
.wiz-room-tile.excluded{opacity:0.35;background:var(--warm);}
.wiz-room-tile:hover:not(.excluded){border-color:var(--rust2);}
.wiz-room-icon{font-size:18px;flex-shrink:0;}
.wiz-room-name{font-size:12px;font-weight:500;color:var(--ink);flex:1;line-height:1.3;}
.wiz-room-remove{
  position:absolute;top:6px;right:6px;
  width:18px;height:18px;border-radius:50%;
  background:rgba(184,92,58,0.15);color:var(--rust);
  border:none;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.15s;line-height:1;
}
.wiz-room-tile:hover .wiz-room-remove{opacity:1;}
.wiz-room-tile.excluded .wiz-room-remove{opacity:1;background:rgba(74,124,95,0.15);color:var(--green);}

/* Room diagnostic card */
.wiz-room-card{
  background:var(--card);border-radius:var(--r);
  border:1px solid var(--border);box-shadow:0 2px 8px var(--shadow);
  margin-bottom:16px;overflow:hidden;
}
.wiz-room-card-header{
  background:var(--ink2);padding:14px 18px;
  display:flex;align-items:center;gap:10px;
}

// localStorage is used as a fast local cache — Supabase is the source of truth.
// On load: check Supabase first, fall back to local cache if offline.
// On save: write to both immediately.

function loadLocalState(){
  try{return JSON.parse(localStorage.getItem('hearth_v1')||'{}');}catch{return {};}
}
function saveLocalState(){
  try{localStorage.setItem('hearth_v1',JSON.stringify(state));}catch{}
}

let userKey = localStorage.getItem('hearth_user_key') || null;
let state = loadLocalState();
let supabaseSynced = false;

// Debounced cloud save — batches rapid changes into one write
let saveTimer = null;
function saveState(){
  saveLocalState(); // always instant
  setSyncDot('syncing');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    if(userKey){
      sbSave(userKey, state)
        .then(()=>setSyncDot('synced'))
        .catch(()=>setSyncDot(''));
    }
  }, 1500);
}

async function confirmUserKey(){
  const raw = document.getElementById('key-input').value.trim().toLowerCase().replace(/\s+/g,'-');

  try{
    const existing = await sbLoad(raw);

    userKey = raw;
    if(existing){
      state = existing;
      saveLocalState();
      showToast('Welcome back ✓');

      await sbSave(raw, state);
      showToast('Account created ✓');

    supabaseSynced = true;
    // Remove overlay and render app

// ── HELPERS ────────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().split('T')[0];}
function daysBetween(a,b){
  return Math.floor((new Date(b)-new Date(a))/(1000*60*60*24));
}
function dueDate(job){
  if(!job.last_done) return today(); // never done = due now
  const days = FREQ_DAYS[job.freq]||0;
  if(days===0) return null; // one-off done
  const d = new Date(job.last_done);
  d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}
function isDue(job){
  if(job.status==='assigned'||job.status==='done') return false;
  if(job.tier==='stepchange') return false;
  const dd = dueDate(job);
  if(!dd) return false;
  return dd <= today();
}
function daysOverdue(job){
  const dd = dueDate(job);
  if(!dd) return 0;
  return Math.max(0, daysBetween(dd, today()));
}
function lastDoneLabel(job){
  if(!job.last_done) return 'Never done';
  const days = daysBetween(job.last_done, today());
  if(days===0) return 'Done today';
  if(days===1) return 'Done yesterday';
  return `Done ${days} days ago`;
}
function dueDateLabel(job){
  const dd = dueDate(job);
  if(!dd) return '—';
  const days = daysBetween(today(), dd);
  if(days<0) return `${Math.abs(days)}d overdue`;
  if(days===0) return 'Due today';
  return `Due in ${days}d`;
}

// ── CHUNK HELPERS ──────────────────────────────────────────────────────────
const CHUNK_MINS = 20;

function defaultChunkCount(job){
  // Auto-generate chunks for jobs >= 60 mins (excluding 999=major)
  if(job.mins >= 60 && job.mins < 999) return Math.round(job.mins / CHUNK_MINS);
  return 0;
}

function ensureChunks(job){
  // Called lazily when we render a job. Adds chunks array if needed.
  if(job.chunks) return; // already has chunks (even if empty array)
  const n = defaultChunkCount(job);
  if(n <= 0){ job.chunks = []; return; }
  job.chunks = Array.from({length:n},(_,i)=>({
    id: `${job.id}_c${i}`,
    name: `Part ${i+1}`,
    done_date: null,
  }));
}

function chunksForJob(job){
  ensureChunks(job);
  return job.chunks;
}

function chunkProgress(job){
  const chunks = chunksForJob(job);
  if(!chunks.length) return null; // no chunks
  const done = chunks.filter(c=>c.done_date).length;
  return {done, total:chunks.length, pct: Math.round(done/chunks.length*100)};
}

function hasChunks(job){
  ensureChunks(job);
  return job.chunks.length > 0;
}

function allChunksDone(job){
  const chunks = chunksForJob(job);
  return chunks.length > 0 && chunks.every(c=>c.done_date);
}

// When a job becomes due again (on render), reset chunk dates but keep names
function maybeResetChunks(job){
  if(!hasChunks(job)) return;
  if(!isDue(job)) return;
  // If due and ALL chunks were done (i.e. we fully completed last cycle), reset them
  const allDone = job.chunks.every(c=>c.done_date);
  if(allDone){
    job.chunks.forEach(c=>c.done_date=null);
    saveState();
  }
}

function tickNextChunk(id, mode){
  const job = state.jobs[id];
  ensureChunks(job);
  const next = job.chunks.find(c=>!c.done_date);
  if(!next) return;
  next.done_date = today();
  // If all chunks now done, mark the whole job done
  if(allChunksDone(job)){
    markDone(id, mode);
    return;
  }
  saveState();
  showToast(`✓ ${next.name} done`);
  if(mode==='dispatch') renderDispatch();
  if(mode==='roulette') spinRoulette();
  if(mode==='room') renderRoomJobs(job.room);
}

function toggleChunk(jobId, chunkId, mode){
  const job = state.jobs[jobId];
  const chunk = job.chunks.find(c=>c.id===chunkId);
  if(!chunk) return;
  chunk.done_date = chunk.done_date ? null : today();
  // If all done, mark job done
  if(allChunksDone(job)){
    markDone(jobId, mode);
    return;
  }
  saveState();
  if(mode==='dispatch') renderDispatch();
  if(mode==='roulette'){
    // re-render current roulette card
    document.getElementById('roulette-content').innerHTML = renderJobCard(job,'roulette');
  }
  if(mode==='room') renderRoomJobs(job.room);
}


function getDueJobs(maxMins){
  return Object.values(state.jobs)
    .filter(j=>isDue(j))
    .filter(j=>!maxMins||j.mins<=maxMins)
    .sort((a,b)=>{
      const ao=daysOverdue(a), bo=daysOverdue(b);
      if(bo!==ao) return bo-ao;
      return b.reset_count-a.reset_count;
    });
}

function getAvailableJobs(){
  return Object.values(state.jobs)
    .filter(j=>{
      if(j.status==='assigned'||j.status==='done') return false;
      if(j.tier==='stepchange') return false;
      if(isDue(j)) return false;
      const dd = dueDate(j);
      if(!dd) return false;
      return true;
    })
    .sort((a,b)=>{
      const da = daysBetween(today(), dueDate(a));
      const db = daysBetween(today(), dueDate(b));
      return da - db;
    });
}

let currentDispatchJob = null;
let showAllAvailable = false;

function renderDispatch(){
  const due = getDueJobs();
  const assigned = Object.values(state.jobs).filter(j=>j.status==='assigned');
  const total = Object.values(state.jobs).length;
  const done_today = Object.values(state.jobs).filter(j=>j.last_done===today()).length;

  // Ensure chunks exist for all jobs (lazy init)
  Object.values(state.jobs).forEach(j=>ensureChunks(j));

  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-card"><div class="stat-num">${due.length}</div><div class="stat-lbl">Due now</div></div>
    <div class="stat-card"><div class="stat-num">${done_today}</div><div class="stat-lbl">Done today</div></div>
    <div class="stat-card"><div class="stat-num">${assigned.length}</div><div class="stat-lbl">Assigned</div></div>
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Total jobs</div></div>
  `;

  const el = document.getElementById('dispatch-content');
  let html = '';

  if(due.length){
    if(!currentDispatchJob || !due.find(j=>j.id===currentDispatchJob)){
      currentDispatchJob = due[0].id;
    }
    const job = state.jobs[currentDispatchJob];
    maybeResetChunks(job);
    html += renderJobCard(job, 'dispatch');
    if(due.length > 1){
      html += `<div style="text-align:center;font-size:11px;color:var(--slate);padding:6px 0 0;">${due.length - 1} more due — use Roulette me or Not now to see them</div>`;
    }
  } else {
    html += `<div class="empty-state"><div class="big">All clear</div><p>Nothing due right now — pick something from below if you fancy it.</p></div>`;
  }

  // Available (not-yet-due) jobs section
  const available = getAvailableJobs();
  if(available.length){
    const show = showAllAvailable ? available : available.slice(0,5);
    html += `<div class="available-section">
      <div class="section-label">Also available — not yet due</div>
      ${show.map(j=>{
        const dd = dueDate(j);
        const daysUntil = daysBetween(today(), dd);
        const dueStr = daysUntil===0?'Due today':daysUntil===1?'Due tomorrow':`Due in ${daysUntil}d`;
        const prog = chunkProgress(j);
        const progStr = prog ? ` · ${prog.done}/${prog.total} parts` : '';
        return `<div class="available-job" onclick="pickAvailableJob('${j.id}')">
          <div class="available-job-info">
            <div class="available-job-title">${j.title}</div>
            <div class="available-job-meta">${j.room} · ${j.mins===999?'major':j.mins+'m'}${progStr}</div>
          </div>
          <div class="available-job-due">${dueStr}</div>
        </div>`;
      }).join('')}
      ${!showAllAvailable && available.length > 5 ? `<button onclick="showAllAvailable=true;renderDispatch();" style="width:100%;background:none;border:1px solid var(--warm2);border-radius:var(--r2);padding:9px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--slate);cursor:pointer;margin-top:4px;">Show all ${available.length} available jobs</button>` : ''}
    </div>`;
  }

  el.innerHTML = html;
}

function pickAvailableJob(id){
  // Surface an available job as the current dispatch card
  currentDispatchJob = id;
  const job = state.jobs[id];
  // Temporarily mark it as "active" in dispatch view by showing the full card
  const el = document.getElementById('dispatch-content');
  const due = getDueJobs();
  const available = getAvailableJobs();
  maybeResetChunks(job);

  let html = '';
  if(due.length){
    html += `<div style="margin-bottom:8px;"><div class="section-label">Due now — ${due.length} job${due.length>1?'s':''}</div>
    ${due.slice(0,3).map(j=>`<div class="available-job" onclick="pickAvailableJob('${j.id}')">
      <div class="available-job-info"><div class="available-job-title">${j.title}</div><div class="available-job-meta">${j.room} · ${dueDateLabel(j)}</div></div>
    </div>`).join('')}
    ${due.length>3?`<div style="font-size:11px;color:var(--slate);padding:4px 0;">&hellip;and ${due.length-3} more</div>`:''}
    </div>`;
  }
  html += `<div class="section-label" style="margin-top:0;">Selected</div>`;
  html += renderJobCard(job, 'dispatch');
  el.innerHTML = html;
}

function renderJobCard(job, mode){
  ensureChunks(job);
  const overdue = daysOverdue(job);
  const dueLabel = dueDateLabel(job);
  const dueClass = overdue>0?'overdue':overdue===0?'due-soon':'';
  const equipHtml = job.equip&&job.equip.length
    ? `<div class="card-equipment">${job.equip.map(e=>`<span class="equip-tag">${e}</span>`).join('')}</div>` : '';
  const resetHtml = job.reset_count>0
    ? `<div class="reset-flag">Skipped ${job.reset_count} time${job.reset_count>1?'s':''} — you keep avoiding this one</div>` : '';
  const notesHtml = job.notes
    ? `<div class="card-notes">${job.notes}</div>` : '';

  const prog = chunkProgress(job);
  const progHtml = prog ? `
    <div class="progress-wrap">
      <div class="progress-label">
        <span class="progress-label-text">Progress</span>
        <span class="progress-label-count">${prog.done} of ${prog.total} parts done</span>
      </div>
      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${prog.pct}%"></div></div>
    </div>` : '';

  const chunksHtml = job.chunks && job.chunks.length ? `
    <div class="chunk-list">
      ${job.chunks.map(c=>`
        <div class="chunk-item">
          <button class="chunk-check ${c.done_date?'done':''}" onclick="toggleChunk('${job.id}','${c.id}','${mode}')" title="${c.done_date?'Undo':'Mark done'}">✓</button>
          <div class="chunk-info">
            <div class="chunk-name ${c.done_date?'done':''}">${c.name}</div>
            ${c.done_date?`<div class="chunk-date">${formatChunkDate(c.done_date)}</div>`:''}
          </div>
        </div>`).join('')}
    </div>` : '';

  // Action buttons — if chunked, show "Do a bit" as primary; "All done" as secondary
  const nextChunk = job.chunks && job.chunks.find(c=>!c.done_date);
  const actionsHtml = prog ? `
    <div class="card-actions">
      ${nextChunk
        ? `<button class="btn btn-doabit" onclick="tickNextChunk('${job.id}','${mode}')">▶ Do a bit — ${nextChunk.name}</button>`
        : `<button class="btn btn-done" onclick="markDone('${job.id}','${mode}')">✓ All done</button>`
      }
      <button class="btn btn-roulette" onclick="rouletteMe('${mode}')">Roulette me</button>
    </div>
    <div class="card-actions-row2">
      <button class="btn btn-later btn-small" onclick="notNow('${job.id}','${mode}')">Not now</button>
      <button class="btn btn-assign btn-small" onclick="openAssignModal('${job.id}')">Assign</button>
      <button class="btn btn-done btn-small" style="font-size:11px;padding:9px 8px;" onclick="markDone('${job.id}','${mode}')">✓ All done</button>
    </div>` : `
    <div class="card-actions">
      <button class="btn btn-done" onclick="markDone('${job.id}','${mode}')">✓ Done</button>
      <button class="btn btn-roulette" onclick="rouletteMe('${mode}')">Roulette me</button>
    </div>
    <div class="card-actions-row2">
      <button class="btn btn-later btn-small" onclick="notNow('${job.id}','${mode}')">Not now</button>
      <button class="btn btn-assign btn-small" onclick="openAssignModal('${job.id}')">Assign</button>
      <button class="btn btn-later btn-small" onclick="showInfo('${job.id}')">⋯</button>
    </div>`;

  return `
    <div class="dispatch-card">
      <div class="card-header">
        <div style="flex:1">
          <div class="card-room">${job.room}</div>
          <div class="card-title">${job.title}</div>
        </div>
        <span class="tier-badge t-${job.tier}">${job.tier}</span>
      </div>
      <div class="card-meta">
        <div class="meta-item"><div class="meta-label">Time</div><div class="meta-value">${prog ? `${CHUNK_MINS}m per part` : job.mins===999?'Half day+':job.mins+'m'}</div></div>
        <div class="meta-item"><div class="meta-label">Due</div><div class="meta-value ${dueClass}">${dueLabel}</div></div>
        <div class="meta-item"><div class="meta-label">Frequency</div><div class="meta-value">${job.freq}</div></div>
        <div class="meta-item"><div class="meta-label">Last done</div><div class="meta-value">${lastDoneLabel(job)}</div></div>
      </div>
      ${notesHtml}
      ${equipHtml}
      ${resetHtml}
      ${progHtml}
      ${chunksHtml}
      ${actionsHtml}
    </div>
  `;
}

function formatChunkDate(dateStr){
  if(!dateStr) return '';
  const days = daysBetween(dateStr, today());
  if(days===0) return 'Done today';
  if(days===1) return 'Done yesterday';
  return `Done ${days} days ago`;
}

function markDone(id, mode){
  state.jobs[id].last_done = today();
  state.jobs[id].reset_count = 0;
  state.jobs[id].status = 'active';
  saveState();
  showToast('✓ Done — great work');
  currentDispatchJob = null;
  if(mode==='dispatch') renderDispatch();
  if(mode==='roulette') renderRoulette();
  if(mode==='room') renderRoomJobs(state.jobs[id].room);
}

function notNow(id, mode){
  state.jobs[id].reset_count = (state.jobs[id].reset_count||0)+1;
  saveState();
  currentDispatchJob = null;
  if(mode==='dispatch'){
    const due = getDueJobs();
    if(due.length>1){
      const next = due.find(j=>j.id!==id);
      if(next) currentDispatchJob = next.id;
    }
    renderDispatch();
  }
  if(mode==='roulette') spinRoulette();
  if(mode==='room') renderRoomJobs(state.jobs[id].room);
}

function rouletteMe(mode){
  if(mode==='dispatch'){
    const due = getDueJobs();
    if(due.length<2) return;
    const others = due.filter(j=>j.id!==currentDispatchJob);
    currentDispatchJob = others[Math.floor(Math.random()*others.length)].id;
    renderDispatch();
  } else {
    spinRoulette();
  }
}

// ── ROULETTE ───────────────────────────────────────────────────────────────
let rouletteMaxMins = 30;
let rouletteRoomMode = 'any';
let rouletteRoom = '';

function setTime(mins, btn){
  rouletteMaxMins = mins;
  document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function setRouletteMode(mode, btn){
  rouletteRoomMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('roulette-room-select').style.display = mode==='room'?'block':'none';
}

function renderRoulette(){
  const el = document.getElementById('roulette-content');
  // Populate room picker
  const picker = document.getElementById('roulette-room-picker');
  const rooms = [...new Set(JOB_TEMPLATES.filter(j=>j.tier!=='stepchange').map(j=>j.room))].sort();
  picker.innerHTML = rooms.map(r=>`<option value="${r}">${r}</option>`).join('');
  el.innerHTML = `<div style="text-align:center;padding:30px 0;color:var(--slate2);font-size:13px;font-weight:300;">Press spin to get a job</div>`;
}

function spinRoulette(){
  const maxMins = rouletteMaxMins;
  let pool = Object.values(state.jobs)
    .filter(j=>isDue(j));

  // Also include in-progress chunked jobs (they have a next 20m part to do)
  const inProgressChunked = Object.values(state.jobs).filter(j=>{
    if(j.status==='assigned'||j.status==='done') return false;
    if(j.tier==='stepchange') return false;
    if(isDue(j)) return false; // already in pool
    const chunks = chunksForJob(j);
    if(!chunks.length) return false;
    return chunks.some(c=>c.done_date) && chunks.some(c=>!c.done_date);
  });
  pool = [...pool, ...inProgressChunked];

  // Time bracket filtering — chunked jobs with a next part count as 20m
  if(maxMins===30) pool = pool.filter(j=>j.mins<=30 || (hasChunks(j) && CHUNK_MINS<=30));
  else if(maxMins===60) pool = pool.filter(j=>(j.mins>30&&j.mins<=60) || (hasChunks(j) && CHUNK_MINS<=60));
  else if(maxMins===180) pool = pool.filter(j=>(j.mins>60&&j.mins<=180) || hasChunks(j));
  else if(maxMins===999) pool = pool.filter(j=>j.mins>180);

  if(rouletteRoomMode==='room'){
    const room = document.getElementById('roulette-room-picker').value;
    pool = pool.filter(j=>j.room===room);
  }
  const el = document.getElementById('roulette-content');
  if(!pool.length){
    el.innerHTML=`<div style="text-align:center;padding:30px 0;color:var(--slate2);font-size:13px;">Nothing due in that time bracket — try a longer window.</div>`;
    return;
  }
  let i=0;
  let chosen;
  const tick = setInterval(()=>{
    const r = pool[Math.floor(Math.random()*pool.length)];
    el.innerHTML=`<div class="dispatch-card" style="opacity:0.4"><div class="card-header"><div style="flex:1"><div class="card-room">${r.room}</div><div class="card-title">${r.title}</div></div></div></div>`;
    i++;
    if(i>12){
      clearInterval(tick);
      chosen = pool[Math.floor(Math.random()*pool.length)];
      ensureChunks(chosen);
      el.innerHTML = renderJobCard(chosen,'roulette');
    }
  },80);
}

// ── ROOMS ──────────────────────────────────────────────────────────────────
let selectedRoom = null;

function renderRooms(){
  const rooms = [...new Set(JOB_TEMPLATES.filter(j=>j.tier!=='stepchange').map(j=>j.room))].sort();
  const grid = document.getElementById('room-grid');
  grid.innerHTML = rooms.map(r=>{
    const jobs = Object.values(state.jobs).filter(j=>j.room===r&&j.tier!=='stepchange');
    const due = jobs.filter(j=>isDue(j)).length;
    const safeR = r.replace(/'/g,'&#39;');
    return `<div class="room-card ${selectedRoom===r?'selected':''}" data-room="${safeR}" onclick="selectRoom(this.dataset.room)">
      <div class="room-name">${r}</div>
      <div class="room-count">${jobs.length} jobs</div>
      ${due>0?`<div class="room-due">${due} due</div>`:''}
    </div>`;
  }).join('');
  if(selectedRoom) renderRoomJobs(selectedRoom);
}

function selectRoom(room){
  selectedRoom = room;
  renderRooms();
  // Scroll to job list after render
  setTimeout(()=>{
    const el = document.getElementById('room-jobs-content');
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  }, 80);
}

function isDue(job){
  if(job.status==='assigned'||job.status==='done') return false;
  if(job.tier==='stepchange') return false;
  if(job.wizSkipped) return false; // hidden by user in wizard
  const dd = dueDate(job);
  if(!dd) return false;
  return dd <= today();
}

function renderRoomJobs(room){
  selectedRoom = room;
  const jobs = Object.values(state.jobs)
    .filter(j=>j.room===room&&j.tier!=='stepchange')
    .sort((a,b)=>{
      const ad=isDue(a)?0:1, bd=isDue(b)?0:1;
      return ad-bd;
    });
  const el = document.getElementById('room-jobs-content');
  if(!jobs.length){el.innerHTML='';return;}
  el.innerHTML = `
    <div class="section-label">${room}</div>
    ${jobs.map(j=>renderJobCard(j,'room')).join('')}
  `;
}

// ── ASSIGNED ───────────────────────────────────────────────────────────────
function renderAssigned(){
  const assignees = getAssignees();
  const el = document.getElementById('assigned-all-content');
  if(!el) return;
  let html = '';
  assignees.forEach(person=>{
    const jobs = Object.values(state.jobs).filter(j=>j.assigned_to===person&&j.status==='assigned');
    html += `<div class="section-label">${person}</div>`;
    if(!jobs.length){
      html += `<div style="color:var(--slate2);font-size:13px;font-weight:300;padding:8px 0 12px;">Nothing assigned.</div>`;
    } else {
      html += jobs.map(j=>{
        const days = j.assigned_date ? daysBetween(j.assigned_date,today()) : 0;
        const ageLabel = days===0?'Assigned today':days===1?'Assigned yesterday':`Assigned ${days} days ago`;
        const flag = days>7?' — overdue':'';
        return `<div class="assigned-card">
          <span class="assigned-person p-nick">${person}</span>
          <div class="assigned-info">
            <div class="assigned-title">${j.title}</div>
            <div class="assigned-room">${j.room}</div>
            <div class="assigned-age">${ageLabel}${flag}</div>
            <div class="assigned-actions">
              <button class="btn-tiny btn-markedone" onclick="markAssignedDone('${j.id}')">✓ Done</button>
              <button class="btn-tiny btn-takeback" onclick="takeBack('${j.id}')">Take back</button>
              <button class="btn-tiny btn-nudge" onclick="copyNudge('${j.id}')">Copy nudge</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }
  });
  el.innerHTML = html;
}

function markAssignedDone(id){
  state.jobs[id].last_done = today();
  state.jobs[id].reset_count = 0;
  state.jobs[id].status = 'active';
  state.jobs[id].assigned_to = 'me';
  saveState();
  showToast('✓ Marked done');
  renderAssigned();
}

function takeBack(id){
  state.jobs[id].status = 'active';
  state.jobs[id].assigned_to = 'me';
  state.jobs[id].assigned_date = null;
  saveState();
  renderAssigned();
}

function copyNudge(id){
  const j = state.jobs[id];

function renderSettings(){

    const rooms = [...new Set(Object.values(state.jobs).map(j=>j.room))].sort();
    roomSel.innerHTML = `<option value="">All rooms</option>` +
      rooms.map(r=>`<option value="${r}">${r}</option>`).join('');

  renderAssigneeList();

  if(keyDisplay) keyDisplay.textContent = userKey || '—';

function filterEditorJobs(){
  const q = (document.getElementById('editor-search')||{}).value||'';
  const roomF = (document.getElementById('editor-filter-room')||{}).value||'';
  const tierF = (document.getElementById('editor-filter-tier')||{}).value||'';
  const sortF = (document.getElementById('editor-filter-sort')||{}).value||'room';

  let jobs = Object.values(state.jobs).filter(j=>{
    if(q && !j.title.toLowerCase().includes(q.toLowerCase()) && !j.room.toLowerCase().includes(q.toLowerCase())) return false;
    if(roomF && j.room !== roomF) return false;
    if(tierF && j.tier !== tierF) return false;
    return true;
  });

  if(sortF==='room') jobs.sort((a,b)=>a.room.localeCompare(b.room)||a.title.localeCompare(b.title));
  else if(sortF==='title') jobs.sort((a,b)=>a.title.localeCompare(b.title));
  else if(sortF==='due') jobs.sort((a,b)=>{
    const da = dueDate(a)||'9999'; const db = dueDate(b)||'9999';
    return da.localeCompare(db);
  });

  jobs = jobs.slice(0,40);
  const el = document.getElementById('editor-job-list');
  if(!el) return;
  if(!jobs.length){el.innerHTML='<div style="font-size:13px;color:var(--slate);padding:8px 0;">No jobs found.</div>';return;}
  el.innerHTML = jobs.map(j=>`
    <div class="editor-job-item ${editorSelectedId===j.id?'selected':''}" data-id="${j.id}" onclick="selectEditorJob(this.dataset.id)">
      <div>
        <div class="editor-job-name">${j.title}${j.wizSkipped?'<span style="font-size:10px;color:var(--slate2);margin-left:6px;">(hidden)</span>':''}</div>
        <div class="editor-job-room">${j.room} · ${j.tier} · ${j.freq}</div>
      </div>
      <span class="tier-badge t-${j.tier}" style="flex-shrink:0;">${j.tier}</span>
    </div>
  `).join('');
}

function addChunk(jobId){

  const j = state.jobs[jobId];
  j.chunks.forEach(c=>{
    const inp = document.getElementById(`cname-${c.id}`);
    if(inp) c.name = inp.value.trim() || c.name;
  });
  const n = j.chunks.length;
  j.chunks.push({
    id: `${jobId}_c${Date.now()}`,
    name: `Part ${n+1}`,
    done_date: null,
  });
  saveState();
  selectEditorJob(jobId);

function deleteChunk(jobId, chunkId){
  const j = state.jobs[jobId];
  // Save current names first
  j.chunks.forEach(c=>{
    const inp = document.getElementById(`cname-${c.id}`);
    if(inp) c.name = inp.value.trim() || c.name;
  });
  j.chunks = j.chunks.filter(c=>c.id!==chunkId);
  saveState();
  selectEditorJob(jobId);

function saveEditorJob(id){

function resetJobHistory(id){

function reScatter(){
  if(!confirm('This will re-randomise all job dates. Any jobs you\'ve marked done recently will be reset. Continue?')) return;
  state.scattered = false;
  // Clear all last_done dates for non-large/major/stepchange jobs
  Object.values(state.jobs).forEach(j=>{
    const skipTiers = new Set(['large','major','stepchange']);
    const skipFreqs = new Set(['one-off','as needed']);
    if(skipTiers.has(j.tier)) return;
    if(skipFreqs.has(j.freq)) return;
    j.last_done = null;
  });
  // Re-run scatter
  const SCATTER_FREQS = {'daily':1,'2-3x week':3,'weekly':7,'fortnightly':14,'monthly':30,'quarterly':91,'annually':365,'seasonal':90};
  Object.values(state.jobs).forEach(j=>{
    const skipTiers = new Set(['large','major','stepchange']);
    const skipFreqs = new Set(['one-off','as needed']);
    if(skipTiers.has(j.tier)) return;
    if(skipFreqs.has(j.freq)) return;
    if(j.status==='assigned') return;
    const window = SCATTER_FREQS[j.freq];
    if(!window) return;
    const daysAgo = Math.floor(Math.random()*window);
    const d = new Date();
    d.setDate(d.getDate()-daysAgo);
    j.last_done = d.toISOString().split('T')[0];
  });
  state.scattered = true;
  saveState();
  showToast('Dates re-scattered');
  renderSettings();
}

  const a = document.createElement('a');

function importData(e){

  reader.onload = (ev)=>{
    try{
      state = JSON.parse(ev.target.result);
      saveState();
      renderDispatch();
      showToast('Data restored');
    }catch{showToast('Import failed — invalid file');}
  };
  reader.readAsText(file);
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function boot(){
  if(!userKey){
    showKeySetup();
    return;
  }

  // Show app immediately from local cache
  initState();
  renderDispatch();

  // Show why statement on dispatch if set
  if(state.whyStatement) renderWhyBar();

  // Sync from Supabase in background
  try{
    const cloudState = await sbLoad(userKey);
    if(cloudState){
      state = cloudState;
      saveLocalState();
      supabaseSynced = true;
      initState();
      renderDispatch();
      if(state.whyStatement) renderWhyBar();
    } else {
      await sbSave(userKey, state);
      supabaseSynced = true;
    }
    setSyncDot('synced');
  } catch(e){
    console.warn('Supabase sync failed, using local cache:', e);
  }

  // Launch wizard if never completed
  if(!state.wizardDone){
    setTimeout(()=>launchWizard(), 400);
  }
}

function renderWhyBar(){
  const existing = document.getElementById('why-bar');
  if(existing) existing.remove();
  if(!state.whyStatement) return;
  const bar = document.createElement('div');
  bar.id = 'why-bar';
  bar.style.cssText = `
    background:var(--ink2);padding:10px 20px;
    font-family:'DM Serif Display',serif;font-size:13px;
    color:rgba(255,255,255,0.55);font-style:italic;line-height:1.4;
    border-bottom:1px solid rgba(255,255,255,0.06);
  `;
  bar.textContent = state.whyStatement;
  const panel = document.getElementById('tab-dispatch');
  if(panel) panel.insertBefore(bar, panel.firstChild);
}

function initState(){
  // Initialise jobs from templates if not already in state
  if(!state.jobs){
    state.jobs = {};
    JOB_TEMPLATES.forEach(j=>{
      state.jobs[j.id]={
        ...j,
        last_done:null,
        assigned_to: j.defaultAssign||'me',
        reset_count:0,
        status: j.defaultAssign ? 'assigned' : 'active',
        assigned_date: j.defaultAssign ? today() : null,
      };
    });
  }
  if(!state.stepchange_index) state.stepchange_index = 0;
  if(!state.stepchange_shown) state.stepchange_shown = null;

  // Smart scatter — runs once on first load
  if(!state.scattered){
    const SCATTER_FREQS = {
      'daily':1,'2-3x week':3,'weekly':7,'fortnightly':14,
      'monthly':30,'quarterly':91,'annually':365,'seasonal':90
    };
    const SKIP_TIERS = new Set(['large','major','stepchange']);
    const SKIP_FREQS = new Set(['one-off','as needed']);

    Object.values(state.jobs).forEach(j=>{
      if(SKIP_TIERS.has(j.tier)) return;
      if(SKIP_FREQS.has(j.freq)) return;
      if(j.last_done) return;
      if(j.status === 'assigned') return;
      const window = SCATTER_FREQS[j.freq];
      if(!window) return;
      const daysAgo = Math.floor(Math.random() * window);
      const d = new Date();
      d.setDate(d.getDate() - daysAgo);
      j.last_done = d.toISOString().split('T')[0];
    });
    state.scattered = true;
    saveState();
  }
}

  {id:'other-beds',name:'Other Bedrooms',icon:'🛏️',room:'Guest Bedroom',
   prompts:'Kids\' rooms, spare rooms — honest assessment. What\'s been put off in here?',
   chips:['Clutter','Under beds','Wardrobes','Paintwork','Windows','Floors','Storage']},
  {id:'bathroom',name:'Bathroom(s)',icon:'🚿',room:'Bathroom',
   prompts:'Grout, sealant, caulk — be brutal. Extractor, mirror, storage, taps.',
   chips:['Grout / sealant','Around bath / shower','Extractor fan','Mirror','Taps / limescale','Cabinet inside','Flooring','Towel rail']},
  {id:'utility',name:'Utility / Laundry',icon:'🧺',room:'Utility',
   prompts:'Behind appliances. The chaos shelf. The floor.',
   chips:['Behind washer / dryer','Sink','Shelving','Airer area','Floor','Cupboards']},
  {id:'office',name:'Home Office',icon:'💻',room:'Office',
   prompts:'Cables, shelves, the pile of things with no home.',
   chips:['Desk surface','Cables','Shelving','Paintwork','Windows','Floor']},
  {id:'garden',name:'Garden & Outside',icon:'🏡',room:'Garden & Outside',
   prompts:'Garden, driveway, fences — the forgotten zone.',
   chips:['Garden tidying','Fences / gates','Driveway','Gutters','Outside lights','Paths']},
];

// wizState persists across renders — never reset on render, only on explicit launch
let wizState = {
  stage: 'mission',
  mission: {now:'', want:'', know:''},
  whyStatement: '',
  excludedRooms: new Set(),
  currentRoomIdx: 0,
  extractedJobs: {},   // roomId -> [{text, freq}]
  roomsDone: new Set(),
  skippedTemplateJobs: {}, // roomId -> Set of job ids the user unticked
  roomNotes: {},       // roomId -> textarea content, preserved across re-renders
};

function launchWizard(){
  launchWizardAtStage('mission');
}

function launchWizardAtStage(stage){
  const overlay = document.getElementById('wizard-overlay');
  overlay.style.display = 'block';
  document.body.style.overflow = 'hidden';
  // Restore saved wizard state if available
  if(state.wizState){
    const saved = state.wizState;
    wizState.mission = saved.mission || {now:'',want:'',know:''};
    wizState.whyStatement = saved.whyStatement || '';
    wizState.excludedRooms = new Set(saved.excludedRooms||[]);
    wizState.extractedJobs = saved.extractedJobs || {};
    wizState.roomsDone = new Set(saved.roomsDone||[]);
    wizState.skippedTemplateJobs = saved.skippedTemplateJobs || {};
    wizState.roomNotes = saved.roomNotes || {};
    wizState.currentRoomIdx = saved.currentRoomIdx || 0;
  } else {
    // First time — seed from state.mission if exists
    if(state.mission) wizState.mission = {...state.mission};
    if(state.whyStatement) wizState.whyStatement = state.whyStatement;
  }
  wizState.stage = stage;
  renderWizard();
}

function closeWizard(){
  const overlay = document.getElementById('wizard-overlay');
  overlay.style.display = 'none';
  document.body.style.overflow = '';
}

function pauseWizard(){
  captureWizTextarea(); // save any typed text before closing
  persistWizState();
  closeWizard();
  showToast('Progress saved — continue from Settings');
}

function persistWizState(){
  // Save full wizard state into app state for cloud sync
  state.wizState = {
    stage: wizState.stage,
    mission: wizState.mission,
    whyStatement: wizState.whyStatement,
    excludedRooms: [...wizState.excludedRooms],
    extractedJobs: wizState.extractedJobs,
    roomsDone: [...wizState.roomsDone],
    skippedTemplateJobs: wizState.skippedTemplateJobs,
    roomNotes: wizState.roomNotes,
    currentRoomIdx: wizState.currentRoomIdx,
  };
  state.mission = {...wizState.mission};
  state.whyStatement = wizState.whyStatement;
  saveState();
}

function captureWizTextarea(){
  // Before any re-render, capture current textarea value
  const room = WIZ_ROOMS[wizState.currentRoomIdx];
  if(!room) return;
  const ta = document.getElementById(`wiz-ta-${room.id}`);
  if(ta) wizState.roomNotes[room.id] = ta.value;
}

function renderWizard(){
  const overlay = document.getElementById('wizard-overlay');
  const stages = {mission:1,'rooms-select':2,'rooms-walk':3,summary:4,welcome:5};
  const pct = ((stages[wizState.stage]||1)-1)/4*100;

  let content = '';
  if(wizState.stage==='mission') content = renderWizMission();
  else if(wizState.stage==='rooms-select') content = renderWizRoomsSelect();
  else if(wizState.stage==='rooms-walk') content = renderWizRoomsWalk();
  else if(wizState.stage==='summary') content = renderWizSummary();
  else if(wizState.stage==='welcome') content = renderWizWelcome();

  overlay.innerHTML = `
    <div class="wiz-screen">
      <div class="wiz-header">
        <div class="wiz-logo"><em>Hearth</em> Setup</div>
        <button class="wiz-skip" onclick="pauseWizard()">Save & do this later</button>
      </div>
      <div class="wiz-progress"><div class="wiz-progress-fill" style="width:${pct}%"></div></div>
      ${content}
    </div>
  `;
  overlay.scrollTop = 0;
  // Auto-scroll active pip into view after render
  setTimeout(()=>{
    const activePip = overlay.querySelector('.wiz-pip.active');
    if(activePip) activePip.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  }, 50);
}

// ── STAGE 1: MISSION ───────────────────────────────────────────────────────
function renderWizMission(){
  const m = wizState.mission;
  return `
    <div class="wiz-body">
      <div class="wiz-eyebrow">Step 1 of 4</div>
      <h1 class="wiz-title">Start with <em>why</em></h1>
      <p class="wiz-sub">Before jobs and frequencies, take a moment. The most important thing is knowing what you're doing this for.</p>

      <div class="wiz-question">
        <label>What does your home feel like right now?</label>
        <textarea id="wiz-now" placeholder="Chaotic. Overwhelming. Like I'm always behind…" oninput="wizState.mission.now=this.value;updateWizWhy()">${m.now||''}</textarea>
      </div>
      <div class="wiz-question">
        <label>What do you want it to feel like?</label>
        <textarea id="wiz-want" placeholder="Calm. Under control. A place we actually want to be…" oninput="wizState.mission.want=this.value;updateWizWhy()">${m.want||''}</textarea>
      </div>
      <div class="wiz-question">
        <label>How will you know it's working?</label>
        <textarea id="wiz-know" placeholder="I'll stop dreading people coming over. The boys will have friends round…" oninput="wizState.mission.know=this.value;updateWizWhy()">${m.know||''}</textarea>
      </div>

      <div id="wiz-why-preview" style="${wizState.whyStatement?'':'display:none'}">
        <div class="wiz-why-preview">
          <div class="wiz-why-label">Your why</div>
          <div class="wiz-why-text" id="wiz-why-text">${wizState.whyStatement||''}</div>
        </div>
        <div style="font-size:11px;color:var(--slate);margin-bottom:20px;line-height:1.5;">This will appear quietly in the app as a reminder. You can edit it any time in Settings.</div>
      </div>
    </div>
    <div class="wiz-nav">
      <button class="wiz-btn-next" onclick="wizMissionNext()">Choose your rooms →</button>
    </div>
  `;
}

function updateWizWhy(){
  const want = wizState.mission.want.trim();
  const know = wizState.mission.know.trim();
  if(!want) return;
  let why = `You're doing this so your home feels ${want.replace(/\.$/, '').toLowerCase()}.`;
  if(know) why += ` You'll know it's working when ${know.replace(/\.$/, '').toLowerCase()}.`;
  wizState.whyStatement = why;
  const preview = document.getElementById('wiz-why-preview');
  const text = document.getElementById('wiz-why-text');
  if(preview) preview.style.display = 'block';
  if(text) text.textContent = why;
}

function wizMissionNext(){
  wizState.mission.now = (document.getElementById('wiz-now')||{}).value || wizState.mission.now;
  wizState.mission.want = (document.getElementById('wiz-want')||{}).value || wizState.mission.want;
  wizState.mission.know = (document.getElementById('wiz-know')||{}).value || wizState.mission.know;
  updateWizWhy();
  persistWizState();
  wizState.stage = 'rooms-select';
  renderWizard();
}

// ── STAGE 2: ROOM SELECTION ────────────────────────────────────────────────
function renderWizRoomsSelect(){
  return `
    <div class="wiz-body">
      <div class="wiz-eyebrow">Step 2 of 4</div>
      <h1 class="wiz-title">Your <em>rooms</em></h1>
      <p class="wiz-sub">Tap × to remove any rooms you don't have. We'll walk through the rest one by one.</p>
      <div class="wiz-room-grid">
        ${WIZ_ROOMS.map(r=>{
          const excluded = wizState.excludedRooms.has(r.id);
          return `<div class="wiz-room-tile ${excluded?'excluded':''}" id="wiz-tile-${r.id}">
            <span class="wiz-room-icon">${r.icon}</span>
            <span class="wiz-room-name">${r.name}</span>
            <button class="wiz-room-remove" onclick="toggleWizRoom('${r.id}')">${excluded?'+':'×'}</button>
          </div>`;
        }).join('')}
      </div>
      <p style="font-size:12px;color:var(--slate);font-weight:300;">You can always add rooms later in Settings.</p>
    </div>
    <div class="wiz-nav">
      <button class="wiz-btn-back" onclick="wizState.stage='mission';renderWizard()">←</button>
      <button class="wiz-btn-next" onclick="wizRoomsSelectNext()">Start the walkthrough →</button>
    </div>
  `;
}

function toggleWizRoom(id){
  if(wizState.excludedRooms.has(id)) wizState.excludedRooms.delete(id);
  else wizState.excludedRooms.add(id);
  persistWizState();
  renderWizard();
}

function wizRoomsSelectNext(){
  wizState.currentRoomIdx = 0;
  while(wizState.currentRoomIdx < WIZ_ROOMS.length &&
        wizState.excludedRooms.has(WIZ_ROOMS[wizState.currentRoomIdx].id)){
    wizState.currentRoomIdx++;
  }
  wizState.stage = wizState.currentRoomIdx >= WIZ_ROOMS.length ? 'summary' : 'rooms-walk';
  persistWizState();
  renderWizard();
}

// ── STAGE 3: ROOM WALKTHROUGH ──────────────────────────────────────────────
function renderWizRoomsWalk(){
  const activeRooms = WIZ_ROOMS.filter(r=>!wizState.excludedRooms.has(r.id));
  const room = WIZ_ROOMS[wizState.currentRoomIdx];
  if(!room){ wizState.stage='summary'; renderWizard(); return ''; }
  const doneIdx = activeRooms.findIndex(r=>r.id===room.id);
  const total = activeRooms.length;

  // Template jobs for this room — with checkboxes, ticked by default
  const allTemplateJobs = Object.values(state.jobs)
    .filter(j=>j.room===room.room && j.tier!=='stepchange');
  const skipped = wizState.skippedTemplateJobs[room.id] || [];
  const skippedSet = new Set(skipped);

  const templateSection = allTemplateJobs.length ? `
    <div class="wiz-template-jobs">
      <div class="wiz-template-label">Already in your system — untick anything that doesn't apply</div>
      ${allTemplateJobs.map(j=>`
        <label style="display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;">
          <input type="checkbox" ${skippedSet.has(j.id)?'':'checked'} onchange="wizToggleTemplate('${room.id}','${j.id}',this.checked)"
            style="width:16px;height:16px;accent-color:var(--green);flex-shrink:0;">
          <span style="font-size:12px;color:${skippedSet.has(j.id)?'var(--slate2)':'var(--ink)'};font-weight:300;text-decoration:${skippedSet.has(j.id)?'line-through':'none'}">${j.title}</span>
        </label>`).join('')}
    </div>` : '';

  const extracted = wizState.extractedJobs[room.id] || [];
  const hasExtracted = extracted.length > 0;
  const savedNote = wizState.roomNotes[room.id] || '';

  const extractedSection = hasExtracted ? `
    <div class="wiz-extracted">
      <div class="wiz-extracted-label">Jobs found — edit or delete anything</div>
      <div id="wiz-job-list-${room.id}">
        ${extracted.map((j,i)=>wizJobRowHTML(room.id,i,j.text,j.freq)).join('')}
      </div>
      <div class="wiz-add-row">
        <input class="wiz-add-input" id="wiz-add-${room.id}" placeholder="Add a job I missed…" onkeydown="if(event.key==='Enter')wizAddJob('${room.id}')">
        <button class="wiz-add-btn" onclick="wizAddJob('${room.id}')">+</button>
      </div>
    </div>` : `<div id="wiz-extracted-area-${room.id}"></div>`;

  const pips = activeRooms.map(r=>{
    const isDone = wizState.roomsDone.has(r.id);
    const isActive = r.id === room.id;
    return `<button class="wiz-pip ${isDone?'done':isActive?'active':''}">${r.icon} ${r.name}</button>`;
  }).join('');

  return `
    <div class="wiz-pip-strip" id="wiz-pip-strip">${pips}</div>
    <div class="wiz-body" style="padding-top:20px;">
      <div class="wiz-eyebrow">Room ${doneIdx+1} of ${total}</div>
      <div class="wiz-room-card">
        <div class="wiz-room-card-header">
          <span class="room-icon">${room.icon}</span>
          <div>
            <div class="wiz-room-card-title">${room.name}</div>
            <div class="wiz-room-card-sub">${room.prompts}</div>
          </div>
        </div>
        ${templateSection}
        <div class="wiz-chips">
          ${room.chips.map(c=>`<button class="wiz-chip" onclick="wizAppendChip('${room.id}','${c}')">${c}</button>`).join('')}
        </div>
        <textarea class="wiz-textarea" id="wiz-ta-${room.id}"
          placeholder="Anything specific to your ${room.name.toLowerCase()}? Tap chips above or just type…"
        >${savedNote}</textarea>
        <div class="wiz-room-actions">
          <button class="wiz-btn-analyse" id="wiz-analyse-${room.id}" onclick="wizAnalyseRoom('${room.id}')">
            ${hasExtracted?'Re-analyse →':'Find additional jobs →'}
          </button>
          <button class="wiz-btn-skip" onclick="wizSkipRoom()">Skip</button>
        </div>
        ${extractedSection}
      </div>
    </div>
    <div class="wiz-nav">
      <button class="wiz-btn-back" onclick="wizRoomBack()">←</button>
      <button class="wiz-btn-pause" onclick="pauseWizard()">⏸</button>
      <button class="wiz-btn-next" onclick="wizSaveRoom('${room.id}')">Save & next →</button>
    </div>
  `;
}

function wizToggleTemplate(roomId, jobId, checked){
  if(!wizState.skippedTemplateJobs[roomId]) wizState.skippedTemplateJobs[roomId] = [];
  const skipped = wizState.skippedTemplateJobs[roomId];
  if(!checked){
    if(!skipped.includes(jobId)) skipped.push(jobId);
    // Mark job as hidden in state
    if(state.jobs[jobId]) state.jobs[jobId].wizSkipped = true;
  } else {
    const idx = skipped.indexOf(jobId);
    if(idx>-1) skipped.splice(idx,1);
    if(state.jobs[jobId]) delete state.jobs[jobId].wizSkipped;
  }
  // Update visual immediately without full re-render
  const label = document.querySelector(`input[onchange*="${jobId}"]`);
  if(label){
    const span = label.parentElement.querySelector('span');
    if(span){
      span.style.color = checked ? 'var(--ink)' : 'var(--slate2)';
      span.style.textDecoration = checked ? 'none' : 'line-through';
    }
  }
  persistWizState();
  saveState();
}

function wizAppendChip(roomId, chip){
  const ta = document.getElementById(`wiz-ta-${roomId}`);
  if(ta){ ta.value += (ta.value&&!ta.value.endsWith(' ')?'. ':'')+chip+': '; ta.focus(); }
}

async function wizAnalyseRoom(roomId){
  const ta = document.getElementById(`wiz-ta-${roomId}`);
  const text = ta ? ta.value.trim() : '';
  wizState.roomNotes[roomId] = text;

  const room = WIZ_ROOMS.find(r=>r.id===roomId);
  const btn = document.getElementById(`wiz-analyse-${roomId}`);
  if(btn){ btn.disabled=true; btn.textContent='Finding jobs…'; }

  const area = document.getElementById(`wiz-extracted-area-${roomId}`) ||
               document.querySelector('.wiz-extracted');
  if(area) area.innerHTML = `<div class="wiz-loading"><div class="wiz-spinner"></div>Reading what you said…</div>`;

  // Parse the text into jobs without AI — match keywords to known job patterns
  // This works offline and requires no API key
  const keywords = {
    'grout':       {text:'Re-grout tiles',freq:'annually'},
    'sealant':     {text:'Re-seal around bath/sink',freq:'annually'},
    'mould':       {text:'Treat mould',freq:'monthly'},
    'damp':        {text:'Check and treat damp',freq:'monthly'},
    'crack':       {text:'Fill and paint cracks',freq:'one-off'},
    'paint':       {text:'Repaint walls',freq:'annually'},
    'declutter':   {text:'Full declutter',freq:'quarterly'},
    'clutter':     {text:'Clear clutter',freq:'monthly'},
    'cable':       {text:'Tidy and route cables',freq:'one-off'},
    'window':      {text:'Clean windows inside and out',freq:'quarterly'},
    'blind':       {text:'Clean blinds',freq:'monthly'},
    'curtain':     {text:'Wash curtains',freq:'annually'},
    'carpet':      {text:'Deep clean carpet',freq:'quarterly'},
    'floor':       {text:'Scrub floor properly',freq:'monthly'},
    'skirting':    {text:'Scrub skirting boards',freq:'monthly'},
    'radiator':    {text:'Deep clean radiator',freq:'monthly'},
    'vent':        {text:'Clean vent / extractor',freq:'monthly'},
    'cupboard':    {text:'Clear and wipe cupboard inside',freq:'quarterly'},
    'drawer':      {text:'Declutter drawers',freq:'quarterly'},
    'shelf':       {text:'Clear and wipe shelves',freq:'monthly'},
    'door':        {text:'Sand and repaint door',freq:'one-off'},
    'hinge':       {text:'Fix door hinges',freq:'one-off'},
    'handle':      {text:'Replace door handles',freq:'one-off'},
    'light':       {text:'Clean light fitting',freq:'monthly'},
    'bulb':        {text:'Replace light bulb',freq:'one-off'},
    'cobweb':      {text:'Clear cobwebs',freq:'monthly'},
    'dust':        {text:'Dust all surfaces',freq:'fortnightly'},
    'mirror':      {text:'Clean mirror properly',freq:'fortnightly'},
    'plug':        {text:'Fix electrical issue',freq:'one-off'},
    'leak':        {text:'Fix leak — call plumber',freq:'one-off'},
    'tap':         {text:'Descale taps',freq:'monthly'},
    'limescale':   {text:'Descale fixtures',freq:'monthly'},
    'shower':      {text:'Deep clean shower',freq:'fortnightly'},
    'bath':        {text:'Scrub bath properly',freq:'fortnightly'},
    'toilet':      {text:'Deep clean toilet',freq:'weekly'},
    'sink':        {text:'Descale and clean sink',freq:'weekly'},
    'fridge':      {text:'Deep clean fridge',freq:'quarterly'},
    'oven':        {text:'Deep clean oven',freq:'quarterly'},
    'hob':         {text:'Deep clean hob',freq:'monthly'},
    'extractor':   {text:'Clean extractor fan and filter',freq:'monthly'},
    'microwave':   {text:'Clean microwave inside',freq:'fortnightly'},
    'bin':         {text:'Clean and disinfect bin',freq:'monthly'},
    'wardrobe':    {text:'Clear and organise wardrobe',freq:'quarterly'},
    'storage':     {text:'Sort and reorganise storage',freq:'quarterly'},
    'weed':        {text:'Weed this area',freq:'monthly'},
    'jetwash':     {text:'Jetwash this area',freq:'annually'},
    'fence':       {text:'Repair and treat fence',freq:'annually'},
    'gutter':      {text:'Clear gutters',freq:'annually'},
  };

  const lowerText = text.toLowerCase();
  const foundJobs = [];
  const seen = new Set();

  // Check each keyword against the typed text
  Object.entries(keywords).forEach(([kw, job])=>{
    if(lowerText.includes(kw) && !seen.has(job.text)){
      foundJobs.push({...job});
      seen.add(job.text);
    }
  });

  // Also parse any lines that look like job descriptions
  const lines = text.split(/[.,\n]+/).map(l=>l.trim()).filter(l=>l.length>5&&l.length<80);
  lines.forEach(line=>{
    const clean = line.replace(/^[-•*]\s*/,'').trim();
    if(clean && !seen.has(clean) && foundJobs.length < 15){
      // Only add if it doesn't look like a keyword match already covers it
      const alreadyCovered = Object.keys(keywords).some(kw=>clean.toLowerCase().includes(kw));
      if(!alreadyCovered){
        foundJobs.push({text:clean.charAt(0).toUpperCase()+clean.slice(1),freq:'monthly'});
        seen.add(clean);
      }
    }
  });

  if(!foundJobs.length){
    // Nothing found — still show an empty editable list so they can add manually
    foundJobs.push({text:'',freq:'monthly'});
  }

  wizState.extractedJobs[roomId] = foundJobs;
  persistWizState();
  renderWizard();
}

function wizJobRowHTML(roomId, i, text, freq){
  const freqs=['daily','weekly','fortnightly','monthly','quarterly','annually','one-off'];
  return `<div class="wiz-job-row" id="wiz-row-${roomId}-${i}">
    <input class="wiz-job-input" id="wiz-jt-${roomId}-${i}" value="${text.replace(/"/g,'&quot;')}">
    <select class="wiz-job-freq" id="wiz-jf-${roomId}-${i}">
      ${freqs.map(f=>`<option value="${f}" ${freq===f?'selected':''}>${f}</option>`).join('')}
    </select>
    <button class="wiz-job-del" onclick="wizDelJob('${roomId}',${i})">×</button>
  </div>`;
}

function wizDelJob(roomId,i){
  const row = document.getElementById(`wiz-row-${roomId}-${i}`);
  if(row) row.remove();
}

function wizAddJob(roomId){
  const inp = document.getElementById(`wiz-add-${roomId}`);
  if(!inp||!inp.value.trim()) return;
  const list = document.getElementById(`wiz-job-list-${roomId}`);
  if(!list) return;
  const idx = Date.now();
  const div = document.createElement('div');
  div.innerHTML = wizJobRowHTML(roomId,idx,inp.value.trim(),'monthly');
  list.appendChild(div.firstElementChild);
  inp.value='';
}

function wizCollectJobs(roomId){
  const rows = document.querySelectorAll(`[id^="wiz-row-${roomId}-"]`);
  const jobs=[];
  rows.forEach(row=>{
    const idx=row.id.replace(`wiz-row-${roomId}-`,'');
    const t=document.getElementById(`wiz-jt-${roomId}-${idx}`);
    const f=document.getElementById(`wiz-jf-${roomId}-${idx}`);
    if(t&&t.value.trim()) jobs.push({text:t.value.trim(),freq:f?f.value:'monthly'});
  });
  return jobs;
}

function wizSaveRoom(roomId){
  captureWizTextarea();
  if(wizState.extractedJobs[roomId]){
    wizState.extractedJobs[roomId] = wizCollectJobs(roomId);
  }
  wizState.roomsDone.add(roomId);
  persistWizState();
  wizNextRoom();
}

function wizSkipRoom(){
  captureWizTextarea();
  wizNextRoom();
}

function wizNextRoom(){
  wizState.currentRoomIdx++;
  while(wizState.currentRoomIdx < WIZ_ROOMS.length &&
        wizState.excludedRooms.has(WIZ_ROOMS[wizState.currentRoomIdx].id)){
    wizState.currentRoomIdx++;
  }
  if(wizState.currentRoomIdx >= WIZ_ROOMS.length) wizState.stage='summary';
  persistWizState();
  renderWizard();
}

function wizRoomBack(){
  captureWizTextarea();
  if(wizState.currentRoomIdx===0){ wizState.stage='rooms-select'; renderWizard(); return; }
  wizState.currentRoomIdx--;
  while(wizState.currentRoomIdx>0 && wizState.excludedRooms.has(WIZ_ROOMS[wizState.currentRoomIdx].id)){
    wizState.currentRoomIdx--;
  }
  persistWizState();
  renderWizard();
}

function wizConfirm(){
  const FREQ_MAP = {daily:'daily',weekly:'weekly',fortnightly:'fortnightly',monthly:'monthly',quarterly:'quarterly',annually:'annually','one-off':'one-off'};
  const TIER_MAP = {daily:'micro',weekly:'micro',fortnightly:'micro',monthly:'small',quarterly:'small',annually:'large','one-off':'large'};
  WIZ_ROOMS.forEach(wr=>{
    (wizState.extractedJobs[wr.id]||[]).forEach((j,i)=>{
      if(!j.text.trim()) return;
      const id=`wiz_${wr.id}_${Date.now()}_${i}`;
      const freq=FREQ_MAP[j.freq]||'monthly';
      state.jobs[id]={
        id,title:j.text,room:wr.room,tier:TIER_MAP[freq]||'small',
        freq,mins:30,notes:'',equip:[],
        last_done:null,assigned_to:'me',reset_count:0,
        status:'active',assigned_date:null,chunks:[],
      };
    });
  });
  state.mission = {...wizState.mission};
  state.whyStatement = wizState.whyStatement;
  state.wizardDone = true;
  state.wizState = null; // clear saved wizard progress
  saveState();
  wizState.stage='welcome';
  renderWizard();
}

let wizState = {
  stage: 'mission', // mission | rooms-select | rooms-walk | summary | welcome
  mission: {now:'', want:'', know:''},
  whyStatement: '',
  excludedRooms: new Set(),
  currentRoomIdx: 0,
  extractedJobs: {}, // roomId -> [{text, freq}]
  roomsDone: new Set(),
};

function launchWizard(){
  const overlay = document.getElementById('wizard-overlay');
  overlay.style.display = 'block';
  document.body.style.overflow = 'hidden';
  // Reset wizard state but keep any existing mission if re-running
  wizState.stage = 'mission';
  wizState.excludedRooms = new Set();
  wizState.currentRoomIdx = 0;
  wizState.extractedJobs = {};
  wizState.roomsDone = new Set();
  if(state.mission){
    wizState.mission = {...state.mission};
    wizState.whyStatement = state.whyStatement || '';
  }
  renderWizard();
}

function closeWizard(){
  const overlay = document.getElementById('wizard-overlay');
  overlay.style.display = 'none';
  document.body.style.overflow = '';
}

function pauseWizard(){
  // Save partial progress to state
  state.mission = {...wizState.mission};
  state.whyStatement = wizState.whyStatement;
  saveState();
  closeWizard();
  showToast('Progress saved — continue anytime in Settings');
}

function renderWizard(){
  const overlay = document.getElementById('wizard-overlay');
  const stages = {mission:1, 'rooms-select':2, 'rooms-walk':3, summary:4, welcome:5};
  const pct = ((stages[wizState.stage]||1)-1) / 4 * 100;

  let content = '';
  if(wizState.stage==='mission') content = renderWizMission();
  else if(wizState.stage==='rooms-select') content = renderWizRoomsSelect();
  else if(wizState.stage==='rooms-walk') content = renderWizRoomsWalk();
  else if(wizState.stage==='summary') content = renderWizSummary();
  else if(wizState.stage==='welcome') content = renderWizWelcome();

  overlay.innerHTML = `
    <div class="wiz-screen">
      <div class="wiz-header">
        <div class="wiz-logo"><em>Hearth</em> Setup</div>
        <button class="wiz-skip" onclick="pauseWizard()">Save & do this later</button>
      </div>
      <div class="wiz-progress"><div class="wiz-progress-fill" style="width:${pct}%"></div></div>
      ${content}
    </div>
  `;
  overlay.scrollTop = 0;
}

      <button class="wiz-btn-next" onclick="wizMissionNext()">Choose your rooms →</button>

function updateWizWhy(){
  const now = wizState.mission.now.trim();
  const want = wizState.mission.want.trim();
  const know = wizState.mission.know.trim();
  if(!now && !want) return;
  // Build a quiet why statement from what they've said
  let why = '';
  if(want) why = `You're doing this so your home feels ${want.replace(/\.$/, '').toLowerCase()}.`;
  if(know) why += ` You'll know it's working when ${know.replace(/\.$/, '').toLowerCase()}.`;
  wizState.whyStatement = why;
  const preview = document.getElementById('wiz-why-preview');
  const text = document.getElementById('wiz-why-text');
  if(preview && text){
    preview.style.display = 'block';
    text.textContent = why;
  }
}

function wizMissionNext(){
  state.mission = {...wizState.mission};
  state.whyStatement = wizState.whyStatement;
  saveState();
  wizState.stage = 'rooms-select';
  renderWizard();
}

function renderWizRoomsSelect(){

          const excluded = wizState.excludedRooms.has(r.id);
